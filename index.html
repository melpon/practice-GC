  function p4AoePointInKefkaMagicZone(pt, check){
    if(!pt || typeof pt.x !== 'number' || typeof pt.y !== 'number' || !check) return false;
    const dx = pt.x - 50;
    const dy = pt.y - 50;
    const dist = Math.sqrt(dx * dx + dy * dy);
    return dist <= (check.radius || 22);
  }

  function p4AoeQuestionPointIsCorrect(pt, q){
    if(!q?.aoeBoard || !p4AoePointIsCorrect(pt, q.aoeBoard)) return false;
    if(q.magicOutKefkaCheck){
      const inside = p4AoePointInKefkaMagicZone(pt, q.magicOutKefkaCheck);
      return q.magicOutKefkaCheck.area === 'inside' ? inside : !inside;
    }
    return true;
  }

  function calcGC3Correct(hasAllagan, exTruth, beamTruth){
    // 表示されている超越/アラガン × エクス真偽で同色/異色を決め、ビーム偽で反転する。
    let sameRelation = (!hasAllagan && exTruth) || (hasAllagan && !exTruth);
    if(!beamTruth) sameRelation = !sameRelation;
    return sameRelation ? 'same' : 'opposite';
  }

  function makeGC3Question(role, party, exTruth, beamTruth){
    const hasAllagan = party[role].some(d => d.type === 'allagan');
    const relationCorrect = calcGC3Correct(hasAllagan, exTruth, beamTruth);
    const wound = party[role].find(d => d.type === 'dead' || d.type === 'living');
    const rawDead = wound?.type === 'dead';
    const displayedDead = exTruth ? rawDead : !rawDead;
    const sameColor = displayedDead ? 'blue' : 'purple';
    const oppositeColor = sameColor === 'blue' ? 'purple' : 'blue';
    const correct = relationCorrect === 'same' ? sameColor : oppositeColor;
    const blueRelation = sameColor === 'blue' ? '同色' : '異色';
    const purpleRelation = sameColor === 'purple' ? '同色' : '異色';
    return {
      type:'GC3ビーム判定',
      prompt:`あなたは ${role} です。
${role} には「${hasAllagan ? 'アラガンフィールド' : '死の超越'}」と「${debuffLabel(wound)}」が付いています。
入るべきビームはどちらですか？`,
      note:'青ビーム/紫ビームで選択。括弧内は、自分の傷デバフに対して同色か異色かを表します。中央の細い即死ビームは踏まない。',
      options:[{key:'blue',label:`青ビーム（${blueRelation}）`,cls:'blue-beam'},{key:'purple',label:`紫ビーム（${purpleRelation}）`,cls:'purple-beam'}],
      correct,
      explanation: makeGC3Explanation(hasAllagan, exTruth, beamTruth, relationCorrect, correct)
    };
  }

  function generateGC3(){
    const party = makeEmptyParty();
    const allagan = new Set([...shuffle(thRoles).slice(0,2), ...shuffle(dpsRoles).slice(0,2)]);
    const deadRoles = new Set(shuffle(roles).slice(0,4));
    roles.forEach(r => {
      addDebuff(party, r, {type: allagan.has(r) ? 'allagan' : 'trans', time:'15'});
      addDebuff(party, r, {type: deadRoles.has(r) ? 'dead' : 'living', time:'15'});
    });
    const exTruth = bool();
    const beamTruth = bool();
    const role = $('#roleSelect').value || 'MT';
    const q = makeGC3Question(role, party, exTruth, beamTruth);
    return {round:3, party, role, exTruth, beamTruth, question:q};
  }

  function makeGC3Explanation(hasAllagan, exTruth, beamTruth, relationCorrect, colorCorrect){
    const field = hasAllagan ? 'アラガンフィールド' : '死の超越';
    const exFieldRelation = exTruth
      ? (hasAllagan ? '異色' : '同色')
      : (hasAllagan ? '同色' : '異色');
    const relationFinal = relationCorrect === 'same' ? '同色ビーム' : '逆色ビーム';
    const colorFinal = colorCorrect === 'blue' ? '青ビーム' : '紫ビーム';
    const exText = exTruth
      ? `エクスデスが真なので、表示どおりの${field}として、傷に対して${exFieldRelation}のビーム側です。`
      : `エクスデスが偽なので、表示されている${field}を基準に、傷に対して${exFieldRelation}のビーム側です。`;
    const beamText = beamTruth
      ? 'ビームが真なので、この同色/異色関係のまま処理します。'
      : 'ビームが偽なので、同色/異色関係を反転します。';
    return `${exText}
${beamText}
関係としては「${relationFinal}」。実際に入る場所は「${colorFinal}」です。`;
  }

  function withPreservedScroll(fn){
    const x = window.scrollX || window.pageXOffset || 0;
    const y = window.scrollY || window.pageYOffset || 0;
    preservedScrollTarget = {x, y, until: performance.now() + 800};
    document.activeElement?.blur?.();
    fn();
    restoreScrollPosition(x, y, true);
    setTimeout(() => {
      if(preservedScrollTarget?.x === x && preservedScrollTarget?.y === y){
        preservedScrollTarget = null;
      }
    }, 850);
  }

  function restoreScrollPosition(x, y, persistent = false){
    const restore = () => window.scrollTo(x, y);
    requestAnimationFrame(restore);
    setTimeout(restore, 0);
    setTimeout(restore, 50);
    if(persistent){
      setTimeout(restore, 120);
      setTimeout(restore, 250);
      setTimeout(restore, 500);
      setTimeout(restore, 800);
    }
  }

    state.partyRun.scenario = scenario;

    render();

    if(!sc) return;
    state.partyRun.checks = buildPartyChecks(sc, sc.role);

    const phase = state.partyRun?.phase;
    return phase === 'countdown' || phase === 'running' || phase === 'summary';

    if(!state.scenario || partyRunLocked()) return;
    $('#roleSelect').value = role;
    state.scenario.role = role;
    rebuildQuestionForCurrentRole();
    savePartySettings({ role });

  function p4GazeAoePointIsCorrect(pt, board){
    if(!pt || typeof pt.x !== 'number' || typeof pt.y !== 'number') return false;
    const thunderTruth = typeof board.thunderTruth === 'boolean' ? board.thunderTruth : true;
    return p4AoePointInCircle(pt) && p4AoeThunderSafeByTruth(pt, board, thunderTruth);
  }

  function p4FacingMarkerAngle(pt, direction){
    if(!pt || typeof pt.x !== 'number' || typeof pt.y !== 'number' || !direction) return 0;
    const dx = pt.x - 50;
    const dy = pt.y - 50;
    if(Math.abs(dx) < 0.01 && Math.abs(dy) < 0.01) return direction === 'in' ? 180 : 0;
    let deg = Math.atan2(dx, -dy) * 180 / Math.PI;
    if(direction === 'in') deg += 180;
    return deg;
  }

  function clampPercent(v, min, max){
    return Math.max(min, Math.min(max, v));
  }

  function renderPartyDesc(){
    const el = $('#partyDesc');
    if(el) el.textContent = '待機中はパーティーリストでロールを変更できます。スタート後は固定され、WASD / ドラッグで約104秒・14判定を進めます。';
  }

  function renderModeText(){
    const title = $('#modeTitle');
    const desc = $('#modeDesc');
    if(title) title.textContent = 'P4 グランドクロス練習';
    if(desc) desc.textContent = '3カウント後、timeline.txt 準拠の約104秒ラン。WASD / ドラッグ移動で判定（加速度は付いている場合のみ）。';
  }

  function renderPartyRunScore(){
    const scoreEl = $('#partyRunScore');
    const run = state.partyRun;
    if(!scoreEl) return;
    if(!run?.phase || run.phase === 'idle' || run.scoreInvalid){
      scoreEl.textContent = '';
      return;
    }
    const log = run.failLog || [];
    const completed = log.length;
    if(completed === 0){
      scoreEl.textContent = '成功 0/0';
      return;
    }
    const ok = log.filter(entry => entry.ok).length;
    scoreEl.textContent = `成功 ${ok}/${completed}`;
  }

  function partyListTruthForDebuff(sc, d){
    if(!sc || !d) return null;

    // 通し3・4枚目では、GC1/2由来デバフとGC3由来デバフが同時に表示される。
    // GC1/2由来はデバフ処理側の真偽、GC3由来は3回目GC側の真偽を見る。
    if(sc.positionKind === 'through'){
      if(['water','lightning','accel','gaze'].includes(d.type)) return debuffExTruth(sc.debuff, d.sourceRound);
      if(['fire','waterChaos'].includes(d.type)) return debuffChaosTruth(sc.debuff, d.sourceRound);
      if(['allagan','trans','dead','living'].includes(d.type)) return !!(sc.flood?.exTruth ?? sc.exTruth);
      return null;
    }

    if(sc.round === 1 || sc.round === 2){
      if(['water','lightning','accel','gaze'].includes(d.type)) return debuffExTruth(sc.debuff || sc, sc.round);
      if(['fire','waterChaos'].includes(d.type)) return debuffChaosTruth(sc.debuff || sc, sc.round);
      return null;
    }
    if(sc.round === 3){
      if(['allagan','trans','dead','living'].includes(d.type)) return !!sc.exTruth;
    }
    return null;
  }

  function throughMasterParty(sc){
    if(!sc?.debuff || !sc?.flood) return sc?.party || makeEmptyParty();
    return mergeParties(sc.debuff.party, sc.flood.party);
  }

  function throughVisibleDebuffs(sc, role){
    const ds = (throughMasterParty(sc)[role] || []).map(d => ({...d}));
    if(sc?.positionKind !== 'through') return ds;
    const stage = state.partyRun?.revealStage || 'none';
    if(stage === 'none') return [];
    const isGc12 = (d) => ['water','lightning','accel','gaze','fire','waterChaos'].includes(d.type);
    const isChaos = (d) => ['fire','waterChaos'].includes(d.type);
    const isGc3 = (d) => ['allagan','trans','dead','living'].includes(d.type);
    return ds.filter(d => {
      if(stage === 'gc1_core') return d.sourceRound === 1 && !isChaos(d);
      if(stage === 'gc1_all') return d.sourceRound === 1;
      if(stage === 'gc2_core') return d.sourceRound === 1 || (d.sourceRound === 2 && !isChaos(d));
      if(stage === 'gc2_all') return d.sourceRound === 1 || d.sourceRound === 2;
      if(stage === 'gc3_all') return (isGc12(d) && (d.sourceRound === 1 || d.sourceRound === 2)) || isGc3(d);
      return ds;
    });
  }

  function partyDebuffsForRender(sc, role){
    const elapsed = ['running', 'summary'].includes(state.partyRun?.phase)
      ? partyElapsedMs() : 0;
    return throughVisibleDebuffs(sc, role)
      .filter(d => !partyDebuffResolved(d, elapsed));
  }

  function partyDebuffBadgeSignature(sc, role){
    return partyDebuffsForRender(sc, role)
      .map(d => `${d.type}:${d.timing}:${d.sourceRound}`)
      .join('|');
  }

  function updateDebuffBadgeTimers(badgesEl, sc, role){
    if(state.partyRun?.phase !== 'running') return;
    const elapsed = partyElapsedMs();
    const ds = sortDebuffsForPartyList(partyDebuffsForRender(sc, role));
    const times = badgesEl.querySelectorAll('.icon-time');
    ds.forEach((d, i) => {
      const tText = partyDebuffTimeLabel(d, elapsed);
      if(times[i]){
        if(tText) times[i].textContent = tText;
        else times[i].remove();
      }
    });
  }

  function refreshPartyDebuffBadges(){
    const sc = state.scenario;
    const box = $('#partyList');
    if(!sc || !box) return;
    roles.forEach(role => {
      const row = box.querySelector(`.member[data-role="${role}"]`);
      if(!row) return;
      const badgesEl = row.querySelector('.badges');
      if(!badgesEl) return;
      const sig = partyDebuffBadgeSignature(sc, role);
      if(badgesEl.dataset.sig !== sig){
        badgesEl.dataset.sig = sig;
        renderDebuffBadgesInto(badgesEl, sc, role);
        return;
      }
      updateDebuffBadgeTimers(badgesEl, sc, role);
    });
  }

  function refreshMobileSelfDebuffBadges(){
    const panel = $('#mobileSelfPanel');
    const sc = state.scenario;
    if(!panel || !sc || !panel.children.length) return;
    const role = sc.role || $('#roleSelect').value || 'MT';
    const badgesEl = panel.querySelector('.badges');
    if(!badgesEl) return;
    const sig = partyDebuffBadgeSignature(sc, role);
    if(badgesEl.dataset.sig !== sig){
      badgesEl.dataset.sig = sig;
      renderDebuffBadgesInto(badgesEl, sc, role);
      return;
    }
    updateDebuffBadgeTimers(badgesEl, sc, role);
  }

  function renderDebuffBadgesInto(badges, sc, role){
    badges.innerHTML = '';
    const ds = partyDebuffsForRender(sc, role);
    if(ds.length === 0){
      const b = document.createElement('span');
      b.className = 'badge empty';
      b.textContent = 'なし';
      badges.appendChild(b);
      return;
    }
    sortDebuffsForPartyList(ds).forEach(d => {
      const truth = partyListTruthForDebuff(sc, d);
      const resolved = false;
      const wrap = document.createElement('span');
      wrap.className = `badge-wrap icon-wrap${resolved ? ' resolved-debuff' : ''}`;
      if(state.showPartyTruth && truth !== null){
        const t = document.createElement('span');
        t.className = `truthmark badge-truth ${truth ? 'true-mark' : 'false-mark'}`;
        const gc3Debuff = ['allagan','trans','dead','living'].includes(d.type);
        t.title = gc3Debuff ? 'エクスデス真偽（デバフ表示）' : (truth ? '真' : '偽');
        t.setAttribute('aria-label', t.title);
        if(!truth) t.textContent = '?';
        wrap.appendChild(t);
      }
      const b = document.createElement('span');
      b.className = `badge ${debuffClass(d)} icon-badge${(sc.round === 2 && d.sourceRound === 2) ? ' new-debuff' : ''}`;
      b.title = debuffHoverLabel(d);
      b.setAttribute('aria-label', debuffHoverLabel(d));
      const img = document.createElement('img');
      img.className = 'debuff-icon';
      img.src = debuffIconSrc(d.type);
      img.alt = debuffHoverLabel(d);
      b.appendChild(img);
      const tText = partyDebuffTimeLabel(d, partyElapsedMs());
      if(tText){
        const time = document.createElement('span');
        time.className = 'icon-time';
        time.textContent = tText;
        b.appendChild(time);
      }
      wrap.appendChild(b);
      badges.appendChild(wrap);
    });
  }

  function renderParty(){
    const box = $('#partyList');
    const sc = state.scenario;
    const locked = partyRunLocked();
    box.innerHTML = '';
    roles.forEach(role => {
      const row = document.createElement('button');
      row.type = 'button';
      row.className = `member ${role === sc.role ? 'you' : ''}${locked ? ' locked' : ''}`;
      row.dataset.role = role;
      row.setAttribute('aria-label', locked ? `${role}（ラン中は変更不可）` : `${role}を自分ロールにする`);
      if(locked) row.setAttribute('aria-disabled', 'true');
      const roleDiv = document.createElement('div');
      roleDiv.className = `role ${roleKind(role)}`;
      roleDiv.innerHTML = `${role}${role === sc.role ? '<span class="youmark">YOU</span>' : ''}`;
      const badges = document.createElement('div');
      badges.className = 'badges';
      renderDebuffBadgesInto(badges, sc, role);
      badges.dataset.sig = partyDebuffBadgeSignature(sc, role);
      row.appendChild(roleDiv);
      row.appendChild(badges);
      box.appendChild(row);
    });
  }

  function renderMobileSelfPanel(){
    const panel = $('#mobileSelfPanel');
    const sc = state.scenario;
    if(!panel || !sc){
      if(panel) panel.innerHTML = '';
      return;
    }
    const role = sc.role || $('#roleSelect').value || 'MT';
    panel.innerHTML = '';
    const roleDiv = document.createElement('div');
    roleDiv.className = `role ${roleKind(role)}`;
    roleDiv.innerHTML = `${role}<span class="youmark">YOU</span>`;
    const badges = document.createElement('div');
    badges.className = 'badges';
    renderDebuffBadgesInto(badges, sc, role);
    badges.dataset.sig = partyDebuffBadgeSignature(sc, role);
    panel.appendChild(roleDiv);
    panel.appendChild(badges);
  }

  function p4AoeIceClipRect(zone){
    const rects = {
      A:{x:0,y:0,w:50,h:50},
      B:{x:50,y:0,w:50,h:50},
      C:{x:50,y:50,w:50,h:50},
      D:{x:0,y:50,w:50,h:50}
    };
    return rects[zone];
  }

  function p4AoeAnswerSvg(board){
    const uid = `p4Aoe_${Math.floor(Math.random()*1000000)}`;
    const showThunder = board.phase === 'thunderCharge' || board.phase === 'magicOut' || board.phase === 'readBoth';
    const showIce = board.phase === 'iceCharge' || board.phase === 'magicOut' || board.phase === 'readBoth';
    const rotation = board.light.slope === 'up' ? 'rotate(-45 50 50)' : 'rotate(45 50 50)';
    const safeBands = board.phase === 'magicOut'
      ? p4AoeActualLightningSafeBands(board, 'out')
      : p4AoeActualLightningSafeBands(board, 'charge');
    const safeZones = board.phase === 'magicOut'
      ? p4AoeActualIceSafeZones(board, 'out')
      : p4AoeActualIceSafeZones(board, 'charge');

    const pattern = `
      <pattern id="${uid}_stripe" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
        <rect width="5" height="5" fill="rgba(112,227,160,0.12)"></rect>
        <line x1="0" y1="0" x2="0" y2="5" stroke="rgba(112,227,160,0.95)" stroke-width="2.0"></line>
      </pattern>`;

    if(showThunder && showIce){
      const clipDefs = safeZones.map(zone => {
        const r = p4AoeIceClipRect(zone);
        return `<clipPath id="${uid}_ice_${zone}"><rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}"></rect></clipPath>`;
      }).join('');
      const shapes = safeZones.map(zone => {
        const bandRects = safeBands.map(idx => `<rect class="aoe-answer-fill" x="${idx*25}" y="-50" width="25" height="200" fill="url(#${uid}_stripe)"></rect>`).join('');
        return `<g clip-path="url(#${uid}_ice_${zone})"><g transform="${rotation}">${bandRects}</g></g>`;
      }).join('');
      return `<defs>${pattern}${clipDefs}</defs>${shapes}`;
    }
    if(showThunder){
      const bandRects = safeBands.map(idx => `<rect class="aoe-answer-fill" x="${idx*25}" y="-50" width="25" height="200" fill="url(#${uid}_stripe)"></rect>`).join('');
      return `<defs>${pattern}</defs><g transform="${rotation}">${bandRects}</g>`;
    }
    const zoneRects = safeZones.map(zone => {
      const r = p4AoeIceClipRect(zone);
      return `<rect class="aoe-answer-fill" x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="url(#${uid}_stripe)"></rect>`;
    }).join('');
    return `<defs>${pattern}</defs>${zoneRects}`;
  }

  function clearThroughReadBossMarkers(){
    document.querySelectorAll('.through-boss-marker').forEach(el => el.remove());
    document.querySelectorAll('.boss-cast-hud').forEach(el => el.remove());
  }

  function renderDebuffIceBoard(mapArena, board){
    if(!board || !board.ice) return;
    const rectByZone = {
      A:'<rect class="debuff-ice-fill" x="0" y="0" width="50" height="50"></rect>',
      B:'<rect class="debuff-ice-fill" x="50" y="0" width="50" height="50"></rect>',
      C:'<rect class="debuff-ice-fill" x="50" y="50" width="50" height="50"></rect>',
      D:'<rect class="debuff-ice-fill" x="0" y="50" width="50" height="50"></rect>'
    };
    const shownRects = (board.ice.zones || []).map(z => rectByZone[z] || '').join('');
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'debuff-ice-layer');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('aria-label', '氷床予兆');
    svg.innerHTML = `<defs><clipPath id="p4DebuffIceArenaClip"><circle cx="50" cy="50" r="50"></circle></clipPath></defs><g clip-path="url(#p4DebuffIceArenaClip)">${shownRects}</g>`;
    mapArena.appendChild(svg);

    const ringGroup = document.createElement('div');
    ringGroup.className = 'aoe-ring-group aoe-ring-bottom';
    ringGroup.innerHTML = `<div class="aoe-ring blue"><span class="aoe-ring-text">氷床</span>${truthIconHtml(board.iceTruth)}</div>`;
    mapArena.appendChild(ringGroup);
  }

  function p4DebuffIceSafeZones(board){
    if(!board || !board.ice) return [];
    const shownZones = board.ice.zones || [];
    const otherZones = board.ice.value === '13' ? ['B','D'] : ['A','C'];
    return board.iceTruth ? otherZones : shownZones;
  }

  function p4LateGazePointPosition(pt, q){
    if(!pt || !q?.lateGazeBoard || !p4AoePointInCircle(pt)) return null;
    const dx = pt.x - 50;
    const dy = pt.y - 50;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if(dist <= q.lateGazeBoard.centerRadius) return 'inside';
    if(dist >= q.lateGazeBoard.targetRadius) return 'outside';
    return 'middle';
  }

  function renderLateGazeBoard(mapArena, q){
    mapArena.className = 'arena late-gaze-board';
    const center = document.createElement('div');
    center.className = 'late-gaze-center-zone';
    center.innerHTML = '視線持ち<br>中央';
    mapArena.appendChild(center);
  }

  function p4GazeAoeAnswerSvg(board){
    const uid = `p4GazeAoe_${Math.floor(Math.random()*1000000)}`;
    const rotation = board.light.slope === 'up' ? 'rotate(-45 50 50)' : 'rotate(45 50 50)';
    const safeBands = [];
    const thunderTruth = typeof board.thunderTruth === 'boolean' ? board.thunderTruth : true;
    for(let idx=0; idx<4; idx++){
      let safe = !p4AoeVisibleLightningDanger(board, idx);
      if(!thunderTruth) safe = !safe;
      if(safe) safeBands.push(idx);
    }
    const pattern = `
      <pattern id="${uid}_stripe" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
        <rect width="5" height="5" fill="rgba(112,227,160,0.12)"></rect>
        <line x1="0" y1="0" x2="0" y2="5" stroke="rgba(112,227,160,0.95)" stroke-width="2.0"></line>
      </pattern>`;
    const bandRects = safeBands.map(idx => `<rect class="aoe-answer-fill" x="${idx*25}" y="-50" width="25" height="200" fill="url(#${uid}_stripe)"></rect>`).join('');
    return `<defs>${pattern}</defs><g transform="${rotation}">${bandRects}</g>`;
  }

  function renderP4GazeAoeBoard(mapArena, board){
    mapArena.className = 'arena aoe-board gaze-aoe-board';
    const lightningTransform = board.light.slope === 'up' ? 'rotate(-45 50 50)' : 'rotate(45 50 50)';
    const lightRects = [0,1,2,3].map(idx => {
      const shownDanger = p4AoeVisibleLightningDanger(board, idx);
      const fill = shownDanger ? 'rgba(205,90,255,0.52)' : 'rgba(255,255,255,0)';
      return `<rect class="aoe-light-rect" x="${idx*25}" y="-50" width="25" height="200" style="fill:${fill}"></rect>`;
    }).join('');
    const thunderTruth = typeof board.thunderTruth === 'boolean' ? board.thunderTruth : true;
    mapArena.innerHTML = `
      <svg class="aoe-lightning-layer" viewBox="0 0 100 100" aria-label="雷予兆">
        <defs><clipPath id="p4GazeAoeArenaClip"><circle cx="50" cy="50" r="50"></circle></clipPath></defs>
        <g clip-path="url(#p4GazeAoeArenaClip)" transform="${lightningTransform}">${lightRects}</g>
      </svg>
      <div class="aoe-divider-v"></div><div class="aoe-divider-h"></div>
      <div class="aoe-ring-group aoe-ring-top"><div class="aoe-ring red"><span class="aoe-ring-text">雷床</span>${truthIconHtml(thunderTruth)}</div></div>
    `;
  }

  function renderP4AoeBoard(mapArena, board, selected, answered, revealed){
    const q = state.scenario?.question || {};
    mapArena.className = 'arena aoe-board magic-aoe-board';
    const showThunder = board.phase === 'thunderCharge' || board.phase === 'magicOut' || board.phase === 'readBoth';
    const showIce = board.phase === 'iceCharge' || board.phase === 'magicOut' || board.phase === 'readBoth';
    const thunderTruth = board.phase === 'magicOut' ? board.thunderOutTruth : board.thunderChargeTruth;
    const iceTruth = board.phase === 'magicOut' ? board.iceOutTruth : board.iceChargeTruth;
    const lightningTransform = board.light.slope === 'up' ? 'rotate(-45 50 50)' : 'rotate(45 50 50)';
    const lightRects = showThunder ? [0,1,2,3].map(idx => {
      const shownDanger = p4AoeVisibleLightningDanger(board, idx);
      const fill = shownDanger ? 'rgba(205,90,255,0.52)' : 'rgba(255,255,255,0)';
      return `<rect class="aoe-light-rect" x="${idx*25}" y="-50" width="25" height="200" style="fill:${fill}"></rect>`;
    }).join('') : '';
    const lightningSvg = showThunder ? `
      <svg class="aoe-lightning-layer" viewBox="0 0 100 100" aria-label="雷予兆">
        <defs><clipPath id="p4AoeArenaClip"><circle cx="50" cy="50" r="50"></circle></clipPath></defs>
        <g clip-path="url(#p4AoeArenaClip)" transform="${lightningTransform}">${lightRects}</g>
      </svg>` : '';
    const iceZones = ['A','B','C','D'].map(zone => {
      const shown = showIce && board.ice.zones.includes(zone);
      return `<div class="aoe-ice-zone aoe-q${zone}" style="display:${shown ? 'block' : 'none'}"></div>`;
    }).join('');

    const ringLabelClass = (isOut) => isOut ? 'aoe-ring-text magic-out-ring-label' : 'aoe-ring-text';
    const rings = `
      ${showThunder ? `<div class="aoe-ring-group aoe-ring-top"><div class="aoe-ring red"><span class="${ringLabelClass(board.phase === 'magicOut')}">${board.phase === 'magicOut' ? '雷アウト' : '雷床'}</span>${truthIconHtml(thunderTruth)}</div></div>` : ''}
      ${showIce ? `<div class="aoe-ring-group aoe-ring-bottom"><div class="aoe-ring blue"><span class="${ringLabelClass(board.phase === 'magicOut')}">${board.phase === 'magicOut' ? '氷アウト' : '氷床'}</span>${truthIconHtml(iceTruth)}</div></div>` : ''}
    `;

    mapArena.innerHTML = `
      <div class="aoe-ice-clip">${iceZones}</div>
      ${lightningSvg}
      <div class="aoe-divider-v"></div><div class="aoe-divider-h"></div>
      ${rings}
      <svg class="aoe-answer-layer" viewBox="0 0 100 100" aria-label="正解範囲" style="display:${revealed ? 'block' : 'none'}">
        <defs><clipPath id="p4AoeAnswerArenaClip"><circle cx="50" cy="50" r="50"></circle></clipPath></defs>
        <g clip-path="url(#p4AoeAnswerArenaClip)">${revealed ? p4AoeAnswerSvg(board) : ''}</g>
      </svg>
      <div class="aoe-click-marker" id="p4AoeClickMarker"></div>
    `;

    const marker = mapArena.querySelector('#p4AoeClickMarker');
    if(selected && typeof selected.x === 'number'){
      marker.style.display = 'block';
      marker.style.left = `${selected.x}%`;
      marker.style.top = `${selected.y}%`;
      const pointOk = p4AoeQuestionPointIsCorrect(selected, q);
      marker.classList.toggle('correct', answered && pointOk);
      marker.classList.toggle('wrong', answered && !pointOk);
      marker.classList.toggle('pending', !answered && !revealed);
    }

  }

  $('#partyList').addEventListener('click', (e) => {
    if(partyRunLocked()) return;
    const row = e.target.closest('.member');
    if(!row?.dataset.role) return;
    if($('#roleSelect').value !== row.dataset.role){
      changeSelfRole(row.dataset.role);
    }
  });

  $('#nextBtn').addEventListener('click', newQuestion);
  $('#practiceMapPauseBtn').addEventListener('click', togglePartyPause);
  $('#partySeekBackBtn').addEventListener('click', () => seekPartyRun(-PARTY_SEEK_STEP_MS));
  $('#partySeekForwardBtn').addEventListener('click', () => seekPartyRun(PARTY_SEEK_STEP_MS));
  $('#roleSelect').addEventListener('change', (e) => changeSelfRole(e.target.value));
  $('#partyTruthToggle').addEventListener('change', (e) => {
    state.showPartyTruth = e.target.checked;
    savePartySettings({ showPartyTruth: e.target.checked });
    renderParty();
    renderMobileSelfPanel();
  });

  const PARTY_SETTINGS_KEY = 'practice-gc-settings';
  const PARTY_SETTINGS_DEFAULTS = {
    layoutReversed: false,
    showPartyTruth: true,
    role: 'MT'
  };
  const layoutEl = $('.layout');
  const layoutSwapBtn = $('#layoutSwapBtn');

  function applyLayoutPaneOrder(reversed){
    layoutEl?.classList.toggle('layout-panes-reversed', reversed);
    if(!layoutSwapBtn) return;
    layoutSwapBtn.setAttribute('aria-pressed', reversed ? 'true' : 'false');
    layoutSwapBtn.textContent = reversed ? '左右を戻す' : '左右入替';
  }

  function loadPartySettings(){
    const settings = {...PARTY_SETTINGS_DEFAULTS};
    try {
      const raw = localStorage.getItem(PARTY_SETTINGS_KEY);
      if(!raw) return settings;
      const parsed = JSON.parse(raw);
      if(typeof parsed.layoutReversed === 'boolean') settings.layoutReversed = parsed.layoutReversed;
      if(typeof parsed.showPartyTruth === 'boolean') settings.showPartyTruth = parsed.showPartyTruth;
      if(typeof parsed.role === 'string' && roles.includes(parsed.role)) settings.role = parsed.role;
    } catch {}
    return settings;
  }

  function savePartySettings(partial){
    const next = {...loadPartySettings(), ...partial};
    if(typeof next.role !== 'string' || !roles.includes(next.role)) next.role = PARTY_SETTINGS_DEFAULTS.role;
    try {
      localStorage.setItem(PARTY_SETTINGS_KEY, JSON.stringify(next));
    } catch {}
    return next;
  }

  function applyPartySettings(settings){
    applyLayoutPaneOrder(!!settings.layoutReversed);
    state.showPartyTruth = !!settings.showPartyTruth;
    const truthToggle = $('#partyTruthToggle');
    if(truthToggle) truthToggle.checked = state.showPartyTruth;
    const roleSelect = $('#roleSelect');
    if(roleSelect && roles.includes(settings.role)) roleSelect.value = settings.role;
  }

  applyPartySettings(loadPartySettings());
  layoutSwapBtn?.addEventListener('click', () => {
    const reversed = !layoutEl.classList.contains('layout-panes-reversed');
    applyLayoutPaneOrder(reversed);
    savePartySettings({ layoutReversed: reversed });
  });

  newQuestion();
})();
</script>
