  function escapeHtml(text){
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function partyMacroHtml(text){
    let out = '';
    for(const ch of text){
      if(ch === ' ') out += '<span class="party-macro-hsp"></span>';
      else out += escapeHtml(ch);
    }
    return out;
  }

  function partyRoleWlDebuffForGcRound(party, role, gcRound){
    return (party?.[role] || []).find(d =>
      (d.type === 'water' || d.type === 'lightning') && d.sourceRound === gcRound
    );
  }

  function partyMarkerQualifies(exTruth, wlDebuff){
    if(!wlDebuff) return false;
    if(exTruth && wlDebuff.type === 'lightning') return true;
    if(!exTruth && wlDebuff.type === 'water') return true;
    return false;
  }

  function partyTargetMarkerSrc(role, wlDebuff){
    if(!wlDebuff) return null;
    const isTh = thRoles.includes(role);
    const isEarly = wlDebuff.timing === 'early';
    if(isTh) return isEarly ? PARTY_TARGET_MARKER_SRC.thEarly : PARTY_TARGET_MARKER_SRC.thLate;
    return isEarly ? PARTY_TARGET_MARKER_SRC.dpsEarly : PARTY_TARGET_MARKER_SRC.dpsLate;
  }

  function partyResolveTargetMarker(sc, gcRound){
    const debuff = sc?.debuff;
    const role = sc?.role;
    if(!debuff || !role) return null;
    const wlDebuff = partyRoleWlDebuffForGcRound(debuff.party, role, gcRound);
    if(!partyMarkerQualifies(debuffExTruth(debuff, gcRound), wlDebuff)) return null;
    const src = partyTargetMarkerSrc(role, wlDebuff);
    return src ? { src } : null;
  }

  function rebuildPartyTargetMarkers(elapsed){
    const run = state.partyRun;
    const sc = run?.scenario || state.scenario;
    run.markersGranted = {};
    run.targetMarker = null;
    if(!partyMacroPhaseActive() || elapsed <= 0 || !sc) return;
    PARTY_MARKER_EVENTS.forEach(ev => {
      if(elapsed < ev.atMs) return;
      run.markersGranted[ev.id] = true;
      const resolved = partyResolveTargetMarker(sc, ev.gcRound);
      if(resolved) run.targetMarker = resolved;
    });
  }

  function tickPartyTargetMarkers(elapsed){
    const run = state.partyRun;
    const sc = run?.scenario || state.scenario;
    if(!partyMacroPhaseActive() || elapsed <= 0 || !sc) return false;
    let changed = false;
    PARTY_MARKER_EVENTS.forEach(ev => {
      if(run.markersGranted[ev.id] || elapsed < ev.atMs) return;
      run.markersGranted[ev.id] = true;
      const resolved = partyResolveTargetMarker(sc, ev.gcRound);
      if(resolved){
        run.targetMarker = resolved;
        changed = true;
      }
    });
    return changed;
  }

  function partyMacroChaosActionLine(element, chaosTruth){
    const base = element === 'fire' ? 'circle' : 'donut';
    const finalShape = chaosTruth ? base : (base === 'circle' ? 'donut' : 'circle');
    if(element === 'fire'){
      const action = finalShape === 'circle' ? '外へ' : '内側';
      return `　　　　  |　　　 | ${action} |　　　　   |　　　 |`;
    }
    const action = finalShape === 'circle' ? '外へ' : '内側';
    return `　　　　  |　　　 |　　  |　　　　   |　　　 | ${action}`;
  }

  function buildPartyMacroMessage(id, sc){
    if(!sc) return '';
    if(id === 'macro5'){
      const board = sc.magicBoard || syncThroughMagicBoard(sc, sc.role);
      return board?.thunderChargeTruth ? PARTY_MACRO5_TRUE : PARTY_MACRO5_FALSE;
    }
    if(id === 'macro6'){
      const board = sc.magicBoard || syncThroughMagicBoard(sc, sc.role);
      return board?.iceChargeTruth ? PARTY_MACRO6_TRUE : PARTY_MACRO6_FALSE;
    }
    const d = sc.debuff;
    if(!d) return '';
    switch(id){
      case 'macro1':
        return d.exTruth ? PARTY_MACRO1_TRUE : PARTY_MACRO1_FALSE;
      case 'macro2':
        return partyMacroChaosActionLine(partyChaosCastElement(d, 1), !!d.chaosTruth);
      case 'macro3':
        return debuffExTruth(d, 2) ? PARTY_MACRO3_TRUE : PARTY_MACRO3_FALSE;
      case 'macro4':
        return partyMacroChaosActionLine(partyChaosCastElement(d, 2), !!d.chaosTruth2);
      default:
        return '';
    }
  }

  function partyMacroPhaseActive(){
    const phase = state.partyRun?.phase;
    return phase === 'running' || phase === 'summary';
  }

  function rebuildPartyMacros(elapsed){
    const run = state.partyRun;
    run.macrosPosted = {};
    if(!partyMacroPhaseActive() || elapsed <= 0) return;
    PARTY_MACRO_EVENTS.forEach(ev => {
      if(elapsed >= ev.atMs) run.macrosPosted[ev.id] = true;
    });
  }

  function tickPartyMacros(elapsed){
    const run = state.partyRun;
    if(!partyMacroPhaseActive() || elapsed <= 0) return false;
    let posted = false;
    PARTY_MACRO_EVENTS.forEach(ev => {
      if(run.macrosPosted[ev.id] || elapsed < ev.atMs) return;
      run.macrosPosted[ev.id] = true;
      posted = true;
    });
    return posted;
  }

  function renderPartyChat(options = {}){
    const log = $('#partyChatLog');
    if(!log) return;
    const run = state.partyRun;
    const sc = run?.scenario || state.scenario;
    if(!sc || !partyMacroPhaseActive()){
      log.innerHTML = '';
      if(run) run.partyChatCacheKey = null;
      return;
    }
    const postedIds = PARTY_MACRO_EVENTS.filter(ev => run.macrosPosted?.[ev.id]).map(ev => ev.id);
    const cacheKey = postedIds.join(',');
    const domCount = log.childElementCount;
    const cacheHit = options.lightweight
      && run.partyChatCacheKey === cacheKey
      && domCount === postedIds.length
      && (postedIds.length === 0 || domCount > 0);
    if(cacheHit) return;
    run.partyChatCacheKey = cacheKey;
    const prevScrollTop = log.scrollTop;
    const stickBottom = !!options.macroPosted;
    log.innerHTML = postedIds.map(id => {
      const text = buildPartyMacroMessage(id, sc);
      return `<div class="party-chat-message"><pre class="party-macro-text">${partyMacroHtml(text)}</pre></div>`;
    }).join('');
    if(stickBottom) log.scrollTop = log.scrollHeight;
    else log.scrollTop = prevScrollTop;
  }

  function partyPauseOffsetMs(){
    const run = state.partyRun;
    let pausedExtra = run.pauseAccumMs || 0;
    if(run.paused && run.pauseStartedAt){
      pausedExtra += Date.now() - run.pauseStartedAt;
    }
    return pausedExtra;
  }

  function setPartyElapsedMs(elapsed){
    state.partyRun.anchorAt = Date.now() - elapsed - partyPauseOffsetMs();
  }

  function rebuildPartyTimelineState(elapsed){
    const run = state.partyRun;
    run.checked = {};
    run.failLog = [];
    run.failures = 0;
    run.wlWindows = {};
    run.gazeWindows = {};
    run.chaosLandFlash = null;
    run.flashUntil = 0;
    run.scoreInvalid = false;
    run.displayFired = {};
    run.revealStage = 'none';
    PARTY_DISPLAY_EVENTS.forEach(ev => {
      if(elapsed >= ev.atMs){
        run.displayFired[ev.id] = true;
        run.revealStage = ev.stage;
      }
    });
    PARTY_CHECK_EVENTS.forEach(ev => {
      if(elapsed >= ev.atMs) run.checked[ev.id] = true;
    });
    rebuildPartyMacros(elapsed);
    rebuildPartyTargetMarkers(elapsed);
    run.partyChatCacheKey = null;
    run.partyMapVisualCacheKey = null;
  }

  function seekPartyRun(deltaMs){
    const run = state.partyRun;
    if(!['running', 'summary'].includes(run.phase)) return;
    if(run.phase === 'summary'){
      run.phase = 'running';
      run.active = true;
      attachPartyKeyHandlers();
      if(run.tickTimer == null) startPartyRunLoop();
    }
    const next = Math.max(0, Math.min(PARTY_END_MS, partyElapsedMs() + deltaMs));
    setPartyElapsedMs(next);
    rebuildPartyTimelineState(next);
    render();
    updatePartyTimerUi();
  }

  function syncPartyPause(){
    const run = state.partyRun;
    if(!run.anchorAt) return;
    if(run.paused && !run.pauseStartedAt){
      run.pauseStartedAt = Date.now();
    } else if(!run.paused && run.pauseStartedAt){
      run.pauseAccumMs += Date.now() - run.pauseStartedAt;
      run.pauseStartedAt = 0;
    }
  }

  function partyElapsedMs(){
    const run = state.partyRun;
    if(!run.anchorAt) return 0;
    let pausedExtra = run.pauseAccumMs || 0;
    if(run.paused && run.pauseStartedAt){
      pausedExtra += Date.now() - run.pauseStartedAt;
    }
    return Math.max(0, Date.now() - run.anchorAt - pausedExtra);
  }

  function getActivePartyCasts(elapsed){
    return PARTY_CAST_EVENTS.filter(ev => elapsed >= ev.startMs && elapsed < ev.startMs + ev.durationMs);
  }

  function partyCastEventProgress(ev, elapsed){
    return Math.max(0, Math.min(1, (elapsed - ev.startMs) / (ev.durationMs || 1)));
  }

  function partyCastEventLabel(ev, sc){
    if(ev.type === 'chaos'){
      const round = ev.round || 1;
      const debuff = sc?.debuff || sc;
      return chaosElementLabel(partyChaosCastElement(debuff, round));
    }
    return ev.label || '';
  }

  function partyWlCorrectDirFromSet1(correctKey){
    if(correctKey === 'th_stack') return 'n';
    if(correctKey === 'dps_stack') return 's';
    if(correctKey === 'th_spread') return 'w';
    if(correctKey === 'dps_spread') return 'e';
    return 'n';
  }

  function partyWlCorrectDirFromSet2(correctKey){
    return ['n', 's', 'e', 'w'].includes(correctKey) ? correctKey : 'n';
  }

  function partyWlHitboxCenters(){
    const offset = PARTY_KEFKA_RING_R + PARTY_WL_HITBOX_GAP;
    return {
      n: { x: 50, y: 50 - offset },
      s: { x: 50, y: 50 + offset },
      w: { x: 50 - offset, y: 50 },
      e: { x: 50 + offset, y: 50 }
    };
  }

  function partyPointInCircle(pt, cx, cy, r){
    if(!pt || typeof pt.x !== 'number' || typeof pt.y !== 'number') return false;
    return Math.hypot(pt.x - cx, pt.y - cy) <= r;
  }

  function partyWlPositionOk(pt, correctDir, centers){
    const r = PARTY_WL_HITBOX_R;
    for(const dir of ['n', 's', 'e', 'w']){
      const c = centers[dir];
      const inside = partyPointInCircle(pt, c.x, c.y, r);
      if(dir === correctDir){
        if(!inside) return false;
      } else if(inside) return false;
    }
    return true;
  }

  function partyPlayerIsMoving(run){
    if(!run) return false;
    if(run.drag) return true;
    if(run.keys?.w || run.keys?.a || run.keys?.s || run.keys?.d) return true;
    const hist = run.playerPosHistory;
    const n = partyPosHistorySize();
    const frame = run.playerPosFrame || 0;
    if(!hist || hist.length !== n || frame < 1) return false;
    const curIdx = frame % n;
    const prevIdx = (frame - 1) % n;
    const dx = hist[curIdx].x - hist[prevIdx].x;
    const dy = hist[curIdx].y - hist[prevIdx].y;
    return Math.hypot(dx, dy) >= PARTY_FACING_MIN_DELTA;
  }

  function partyWlAccelOk(run, question){
    const accel = question?.accelCheck;
    if(!accel?.required) return false;
    const moving = partyPlayerIsMoving(run);
    return accel.correct === 'move' ? moving : !moving;
  }

  function partyWlDebuffForSet(debuff, role, setNum){
    const timing = setNum === 1 ? 'early' : 'late';
    return (debuff?.party?.[role] || []).find(d => (d.type === 'water' || d.type === 'lightning') && d.timing === timing) || null;
  }

  function buildPartyWlCorrectDir(debuff, role, setNum){
    const wl = partyWlDebuffForSet(debuff, role, setNum);
    const action = wl ? calcWLAction(wl.type, debuffExTruth(debuff, wl.sourceRound)) : 'stack';
    if(setNum === 1){
      const correctKey = action === 'stack'
        ? (thRoles.includes(role) ? 'th_stack' : 'dps_stack')
        : (thRoles.includes(role) ? 'th_spread' : 'dps_spread');
      return partyWlCorrectDirFromSet1(correctKey);
    }
    if(action === 'stack') return thRoles.includes(role) ? 'n' : 's';
    return thRoles.includes(role) ? 'w' : 'e';
  }

  function partyAccelDebuffForSet(debuff, role, setNum){
    const timing = setNum === 1 ? 'early' : 'late';
    return (debuff?.party?.[role] || []).find(d => d.type === 'accel' && d.timing === timing) || null;
  }

  function buildPartyAccelCheck(debuff, role, setNum){
    const accel = partyAccelDebuffForSet(debuff, role, setNum);
    const timing = setNum === 1 ? 'early' : 'late';
    if(!accel){
      return {
        required: false,
        timing,
        label: `${timingLabel(timing)}加速度なし`,
        explanation: `${role} には${timingLabel(timing)}加速度爆弾が付いていないため、動く/止まるの追加判定は不要です。`
      };
    }
    const exTruth = debuffExTruth(debuff, accel.sourceRound);
    const correct = exTruth ? 'stop' : 'move';
    return {
      required: true,
      timing: accel.timing,
      sourceRound: accel.sourceRound,
      correct,
      label: debuffLabelWithTiming(accel),
      explanation: `${role} には${debuffLabelWithTiming(accel)}が付いています。エクスデス真偽が${truthLabel(exTruth)}なので、${correct === 'stop' ? '止まる' : '動く'}のが正解です。`
    };
  }

  function partyAccelCheckRequired(checks, checkId){
    return !!checks?.[checkId]?.question?.accelCheck?.required;
  }

  function partyApplicableCheckCount(checks){
    return PARTY_CHECK_EVENTS.filter(ev => {
      if(ev.id === 'wl1_accel' || ev.id === 'wl2_accel'){
        return partyAccelCheckRequired(checks, ev.id);
      }
      return true;
    }).length;
  }

  function partyCheckWlIceOk(player, question){
    const pt = { x: player.x, y: player.y };
    const config = question?.debuffSet2Board;
    if(!config?.iceBoard) return true;
    return p4AoePointInCircle(pt) && p4AoeIceSafeByTruth(pt, config.iceBoard, config.iceBoard.iceTruth);
  }

  function partyActiveWlWindow(elapsed, run){
    for(const id of ['wl1', 'wl2']){
      const w = run?.wlWindows?.[id];
      if(w && elapsed >= w.startMs && elapsed < w.endMs){
        const checkId = id === 'wl1' ? 'wl1_pos' : 'wl2_pos';
        return { id, correctDir: run.checks?.[checkId]?.correctDir || 'n' };
      }
    }
    for(const id of ['wl1', 'wl2']){
      const checkId = id === 'wl1' ? 'wl1_pos' : 'wl2_pos';
      const ev = PARTY_CHECK_EVENTS.find(e => e.id === checkId);
      if(ev && elapsed >= ev.atMs && elapsed < ev.atMs + PARTY_WL_HITBOX_MS){
        return { id, correctDir: run.checks?.[checkId]?.correctDir || 'n' };
      }
    }
    return null;
  }

  function partyActiveGazeWindow(elapsed, run){
    for(const id of ['gaze1', 'gaze2']){
      const w = run?.gazeWindows?.[id];
      if(w && elapsed >= w.startMs && elapsed < w.endMs) return { id };
    }
    for(const id of ['gaze1', 'gaze2']){
      const ev = PARTY_CHECK_EVENTS.find(e => e.id === id);
      if(ev && elapsed >= ev.atMs && elapsed < ev.atMs + PARTY_WL_HITBOX_MS) return { id };
    }
    return null;
  }

  function partyDebuffActivationMs(d){
    if(!d?.type || !d.timing) return null;
    if(!['water', 'lightning', 'accel', 'gaze', 'fire', 'waterChaos'].includes(d.type)) return null;
    return PARTY_DEBUFF_ACTIVATION_MS[d.timing]?.[d.type] ?? null;
  }

  function partyDebuffCountdownLabel(d, elapsed){
    const actMs = partyDebuffActivationMs(d);
    if(actMs === null) return '';
    const remainMs = actMs - elapsed;
    if(remainMs <= 0) return '';
    const remainSec = Math.ceil(remainMs / 1000);
    if(remainSec >= 60) return '1m';
    return String(remainSec);
  }

  function partyDebuffGc3CountdownLabel(d, elapsed){
    if(!['allagan', 'trans', 'dead', 'living'].includes(d?.type)) return '';
    const remainMs = PARTY_GC3_DEBUFF_HIDE_MS - elapsed;
    if(remainMs <= 0) return '';
    const remainSec = Math.ceil(remainMs / 1000);
    return String(remainSec);
  }

  function partyDebuffTimeLabel(d, elapsed){
    const phase = state.partyRun?.phase;
    if(phase !== 'running') return timerLabel(d);
    const countdown = partyDebuffCountdownLabel(d, elapsed);
    if(countdown) return countdown;
    const gc3Countdown = partyDebuffGc3CountdownLabel(d, elapsed);
    if(gc3Countdown) return gc3Countdown;
    return timerLabel(d);
  }

  function buildPartyChecks(sc, role){
    const magic1 = makeThroughReadQuestion(sc, role, 0, 'gc1');
    const magic2 = makeThroughReadQuestion(sc, role, 1, 'gc2');
    const magic3 = makeThroughReadQuestion(sc, role, 2, 'gc3');
    syncPartyFloodQuestion(sc, role);
    const wl1Q = getDebuffFlowSlideQuestion(sc.debuff, role, 0);
    const gaze1 = getDebuffFlowSlideQuestion(sc.debuff, role, 1);
    const chaos1 = getDebuffFlowSlideQuestion(sc.debuff, role, 3);
    const wl2Q = getDebuffFlowSlideQuestion(sc.debuff, role, 4);
    const gaze2 = getDebuffFlowSlideQuestion(sc.debuff, role, 5);
    const chaos2 = getDebuffFlowSlideQuestion(sc.debuff, role, 7);
    syncThroughMagicBoard(sc, role);
    const thunder1 = makeMagicChargePositionQuestion(0, sc.magicBoard);
    const magicOut = makeMagicChargePositionQuestion(2, sc.magicBoard);
    /* ほのお/つなみは chaos2_land が判定。雷床・氷床アウトのみ見る。 */
    return {
      magic1_end: { kind: 'aoe', question: magic1 },
      magic2_end: { kind: 'aoe', question: magic2 },
      magic3_end: { kind: 'aoe', question: magic3 },
      flood_end: { kind: 'flood', question: sc.flood.question },
      wl1_pos: {
        kind: 'wlPos',
        question: wl1Q,
        correctDir: buildPartyWlCorrectDir(sc.debuff, role, 1)
      },
      wl1_accel: { kind: 'wlAccel', question: { accelCheck: buildPartyAccelCheck(sc.debuff, role, 1) } },
      thunder1_charge: { kind: 'aoe', question: thunder1 },
      gaze1: { kind: 'gazeEarly', question: gaze1 },
      chaos1_land: { kind: 'chaos', question: chaos1 },
      wl2_pos: {
        kind: 'wlPos',
        question: wl2Q,
        correctDir: buildPartyWlCorrectDir(sc.debuff, role, 2)
      },
      wl2_accel: { kind: 'wlAccel', question: { accelCheck: buildPartyAccelCheck(sc.debuff, role, 2) } },
      wl2_ice: { kind: 'wlIce', question: wl2Q },
      gaze2: { kind: 'gazeLate', question: gaze2 },
      chaos2_land: { kind: 'chaos', question: chaos2 },
      magic_out_land: { kind: 'aoe', question: magicOut }
    };
  }

  function partyPointNearPosition(pt, pos, radius = PARTY_ZONE_RADIUS){
    if(!pt || !pos || typeof pt.x !== 'number' || typeof pos.x !== 'number') return false;
    return Math.hypot(pt.x - pos.x, pt.y - pos.y) <= radius;
  }

  function partyDebuffResolved(d, elapsed){
    if(['allagan', 'trans', 'dead', 'living'].includes(d?.type) && elapsed >= PARTY_GC3_DEBUFF_HIDE_MS){
      return true;
    }
    const actMs = partyDebuffActivationMs(d);
    return actMs !== null && elapsed >= actMs;
  }

  function partyFloodToLocal(pt, rotationDeg){
    const step = Math.round((rotationDeg || 0) / 45);
    const rad = (-Math.PI / 4) * step;
    const dx = pt.x - 50;
    const dy = pt.y - 50;
    return {
      x: 50 + dx * Math.cos(rad) - dy * Math.sin(rad),
      y: 50 + dx * Math.sin(rad) + dy * Math.cos(rad)
    };
  }

  function partyFloodInDeathBeam(pt, rotationDeg){
    if(!pt || typeof pt.x !== 'number' || typeof pt.y !== 'number') return false;
    const local = partyFloodToLocal(pt, rotationDeg);
    return Math.abs(local.x - 50) <= PARTY_FLOOD_DEATH_BEAM_HALF_W;
  }

  function partyFloodPlayerBeamColor(q, pt){
    if(!q?.map || !pt) return null;
    const rotationDeg = q.map.rotationDeg || 0;
    const local = partyFloodToLocal(pt, rotationDeg);
    if(Math.abs(local.x - 50) <= PARTY_FLOOD_DEATH_BEAM_HALF_W) return null;
    const leftColor = q.map.leftColor;
    const rightColor = q.map.rightColor;
    if(!leftColor || !rightColor) return null;
    return local.x < 50 ? leftColor : rightColor;
  }

  function partyFloodCorrectColor(q){
    if(!q?.correct) return null;
    return String(q.correct).replace(/_(th|dps)$/, '');
  }

  function partyFloodCheckStatus(q, player){
    if(!q) return { ok: false, inDeath: false, inCorrect: false, beamColor: null, correctColor: null };
    const pt = { x: player.x, y: player.y };
    const rotationDeg = q.map?.rotationDeg || 0;
    const inDeath = partyFloodInDeathBeam(pt, rotationDeg);
    const beamColor = inDeath ? null : partyFloodPlayerBeamColor(q, pt);
    const correctColor = partyFloodCorrectColor(q);
    const inCorrect = beamColor !== null && beamColor === correctColor;
    return {
      ok: inCorrect,
      inDeath,
      inCorrect,
      beamColor,
      correctColor
    };
  }

  function partyFacingFromDelta(dx, dy){
    if(dx === 0 && dy === 0) return null;
    return Math.atan2(dx, -dy) * 180 / Math.PI;
  }

  function partyPosHistorySize(){
    return PARTY_FACING_LAG_FRAMES + 1;
  }

  function partyResetPlayerPosHistory(run){
    if(!run?.player) return;
    const p = { x: run.player.x, y: run.player.y };
    run.playerPosFrame = 0;
    run.playerPosHistory = Array.from({ length: partyPosHistorySize() }, () => ({ x: p.x, y: p.y }));
  }

  function partyRecordPlayerPosition(run){
    /* rAF 1 回につき 1 スナップショット。pointermove では呼ばない。 */
    if(!run?.player) return;
    const n = partyPosHistorySize();
    if(!run.playerPosHistory || run.playerPosHistory.length !== n){
      partyResetPlayerPosHistory(run);
    }
    run.playerPosFrame = (run.playerPosFrame || 0) + 1;
    const idx = run.playerPosFrame % n;
    run.playerPosHistory[idx] = { x: run.player.x, y: run.player.y };
  }

  function partyUpdateFacingFromHistory(run){
    const hist = run?.playerPosHistory;
    const n = partyPosHistorySize();
    const frame = run.playerPosFrame || 0;
    if(!hist || hist.length !== n || frame < PARTY_FACING_LAG_FRAMES) return false;
    const curIdx = frame % n;
    const oldIdx = (frame - PARTY_FACING_LAG_FRAMES) % n;
    const from = hist[oldIdx];
    const to = hist[curIdx];
    const dx = to.x - from.x;
    const dy = to.y - from.y;
    if(Math.hypot(dx, dy) < PARTY_FACING_MIN_DELTA) return false;
    const facing = partyFacingFromDelta(dx, dy);
    if(facing == null) return false;
    run.player.facing = facing;
    return true;
  }

  function partyApplyPlayerFacingStyle(el, facing){
    if(!el) return;
    el.style.transform = `rotate(${partyFacingDegrees(facing)}deg)`;
  }

  function partyMovePlayerByDelta(run, dxPct, dyPct){
    if(!run?.player) return;
    run.player.x = clampPercent(run.player.x + dxPct, 5, 95);
    run.player.y = clampPercent(run.player.y + dyPct, 5, 95);
  }

  function partyFacingDegrees(facing){
    if(typeof facing === 'number') return facing;
    return ({ n: 0, ne: 45, e: 90, se: 135, s: 180, sw: -135, w: -90, nw: -45 })[facing] ?? 0;
  }

  function partyPlayerFacingVector(player){
    const rad = partyFacingDegrees(player?.facing) * Math.PI / 180;
    return { x: Math.sin(rad), y: -Math.cos(rad) };
  }

  function partyMagicOutCastActive(elapsed){
    const ev = PARTY_CAST_EVENTS.find(e => e.id === 'magicOut');
    return ev ? elapsed >= ev.startMs && elapsed < ev.startMs + ev.durationMs : false;
  }

  function partyGazeRadii(){
    return {
      targetR: PARTY_KEFKA_RING_R,
      centerR: P4_LATE_GAZE_CENTER_RADIUS
    };
  }

  function partyGazeCorrectPosition(q){
    if(q?.correctPosition) return q.correctPosition;
    if(q?.hasGaze != null) return q.hasGaze ? 'inside' : 'outside';
    return 'outside';
  }

  function partyGazePositionOk(pt, correctPosition){
    if(!pt || typeof pt.x !== 'number' || typeof pt.y !== 'number') return false;
    if(!p4AoePointInCircle(pt)) return false;
    const { targetR, centerR } = partyGazeRadii();
    const dist = Math.hypot(pt.x - 50, pt.y - 50);
    if(correctPosition === 'inside') return dist <= centerR;
    if(correctPosition === 'outside') return dist > targetR;
    return false;
  }

  function partyGazeOverlaySvg(correctPosition){
    const uid = `partyGaze_${Math.floor(Math.random() * 1e6)}`;
    const targetR = PARTY_KEFKA_RING_R;
    const centerR = P4_LATE_GAZE_CENTER_RADIUS;
    const clip = `<clipPath id="${uid}_clip"><circle cx="50" cy="50" r="50"></circle></clipPath>`;
    const pattern = `<pattern id="${uid}_stripe" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <rect width="5" height="5" fill="rgba(112,227,160,0.12)"></rect>
      <line x1="0" y1="0" x2="0" y2="5" stroke="rgba(112,227,160,0.95)" stroke-width="2.0"></line>
    </pattern>`;
    if(correctPosition === 'inside'){
      return `<svg class="party-gaze-pos-svg" viewBox="0 0 100 100" aria-hidden="true"><defs>${clip}${pattern}</defs><g clip-path="url(#${uid}_clip)"><circle cx="50" cy="50" r="${centerR}" fill="rgba(99,212,113,.20)"></circle><circle class="party-gaze-answer-fill" cx="50" cy="50" r="${centerR}" fill="url(#${uid}_stripe)"></circle></g></svg>`;
    }
    const holeTop = (50 - targetR).toFixed(4);
    const donut = `<path class="party-gaze-answer-fill" fill="url(#${uid}_stripe)" fill-rule="evenodd" d="M50,0A50,50,0,1,1,49.999,0Z M50,${holeTop}A${targetR},${targetR},0,1,0,50.001,${holeTop}Z"></path>`;
    return `<svg class="party-gaze-pos-svg" viewBox="0 0 100 100" aria-hidden="true"><defs>${clip}${pattern}</defs><g clip-path="url(#${uid}_clip)">${donut}</g></svg>`;
  }

  function partyCheckGazeOk(player, question){
    const dir = partyPlayerGazeDirection(player);
    if(dir !== question?.correctDirection) return false;
    if(question?.aoeGazeBoard){
      return true;
    }
    const pt = { x: player.x, y: player.y };
    const pos = partyGazeCorrectPosition(question);
    return partyGazePositionOk(pt, pos);
  }

  function partyPlayerGazeDirection(player){
    const fx = partyPlayerFacingVector(player);
    const dx = 50 - player.x;
    const dy = 50 - player.y;
    const len = Math.hypot(dx, dy) || 1;
    const fxLen = Math.hypot(fx.x, fx.y) || 1;
    const dot = (fx.x * dx + fx.y * dy) / (fxLen * len);
    return dot > 0.25 ? 'in' : 'out';
  }

  function partyCheckPlayerAt(checkId, player, checks){
    const c = checks?.[checkId];
    if(!c) return true;
    const pt = { x: player.x, y: player.y };
    switch(c.kind){
      case 'aoe':
        return p4AoeQuestionPointIsCorrect(pt, c.question);
      case 'flood': {
        const sc = state.partyRun?.scenario || state.scenario;
        const q = partyResolveFloodQuestion(sc, sc?.role);
        return partyFloodCheckStatus(q, player).ok;
      }
      case 'wlPos':
        return partyWlPositionOk(pt, c.correctDir || 'n', partyWlHitboxCenters());
      case 'wlAccel':
        return partyWlAccelOk(state.partyRun, c.question);
      case 'wlIce':
        return partyCheckWlIceOk(player, c.question);
      case 'gazeEarly':
      case 'gazeLate':
        return partyCheckGazeOk(player, c.question);
      case 'chaos': {
        const sc = state.partyRun?.scenario || state.scenario;
        const setNum = checkId === 'chaos2_land' ? 2 : 1;
        return partyChaosPositionOk(pt, sc, setNum);
      }
      default:
        return true;
    }
  }

  function partyMapVisual(elapsed, run){
    const checked = run.checked || {};
    if(elapsed < 4700 && !checked.magic1_end) return { kind: 'read', magicNum: 1, readKind: 'gc1' };
    if(elapsed >= 15000 && elapsed < 19700 && !checked.magic2_end) return { kind: 'read', magicNum: 2, readKind: 'gc2' };
    if(elapsed >= 30100 && elapsed < 34800 && !checked.magic3_end) return { kind: 'read', magicNum: 3, readKind: 'gc3' };
    if(elapsed >= 45300 && elapsed < 51800 && !checked.flood_end) return { kind: 'flood' };
    if(elapsed >= 81300 && elapsed < 85500 && !checked.wl2_pos) return { kind: 'wl2prep' };
    if(elapsed >= 63500 && elapsed < PARTY_THUNDER1_END_MS && !checked.thunder1_charge) return { kind: 'thunder1' };
    if(elapsed >= PARTY_THUNDER1_END_MS && elapsed < 69500 && !checked.gaze1) return { kind: 'gaze1' };
    if(elapsed >= 92700 && elapsed < 93500 && !checked.gaze2) return { kind: 'gaze2' };
    if(elapsed >= 99000 && elapsed < PARTY_END_MS && (!checked.chaos2_land || !checked.magic_out_land)) return { kind: 'magicOut' };
    return { kind: 'none' };
  }

  function syncPartyScenarioContext(sc, visual){
    if(visual.kind === 'read'){
      if(visual.readKind === 'gc1'){
        sc.party = clonePartyWithSourceRound(sc.debuff.party, 1, 1);
        sc.round = 1;
        sc.exTruth = sc.debuff.exTruth;
        sc.chaosTruth = sc.debuff.chaosTruth;
        sc.chaosElement = partyChaosCastElement(sc.debuff, 1);
      } else if(visual.readKind === 'gc2'){
        sc.party = sc.debuff.party;
        sc.round = 2;
        sc.exTruth = debuffExTruth(sc.debuff, 2);
        sc.chaosTruth = sc.debuff.chaosTruth2;
        sc.chaosElement = partyChaosCastElement(sc.debuff, 2);
      } else {
        sc.party = mergeParties(sc.debuff.party, sc.flood.party);
        sc.round = 3;
        sc.exTruth = sc.flood.exTruth;
        sc.beamTruth = sc.flood.beamTruth;
      }
    } else if(visual.kind === 'flood'){
      sc.party = mergeParties(sc.debuff.party, sc.flood.party);
      sc.round = 3;
      sc.exTruth = sc.flood.exTruth;
      sc.beamTruth = sc.flood.beamTruth;
    } else {
      sc.party = sc.debuff.party;
      sc.round = 2;
      sc.exTruth = debuffExTruth(sc.debuff, 2);
      sc.chaosTruth = debuffChaosTruth(sc.debuff, 2);
    }
  }

  function partyCastActiveForRound(type, round, elapsed){
    const ev = PARTY_CAST_EVENTS.find(e => e.type === type && e.round === round);
    if(!ev) return false;
    return elapsed >= ev.startMs && elapsed < ev.startMs + ev.durationMs;
  }

  function partyBossMarkerContext(sc, elapsed){
    const debuff = sc.debuff;
    const ctx = {
      round: 1,
      exTruth: debuffExTruth(debuff, 1),
      chaosTruth: debuffChaosTruth(debuff, 1)
    };
    if(elapsed >= 30100){
      ctx.round = 3;
      ctx.exTruth = !!(sc.flood?.exTruth ?? debuff?.exTruth);
    } else if(elapsed >= 15000){
      ctx.round = 2;
      ctx.exTruth = debuffExTruth(debuff, 2);
      ctx.chaosTruth = debuffChaosTruth(debuff, 2);
    }
    return ctx;
  }

  function partyGc3EndedMs(){
    const ev = PARTY_CAST_EVENTS.find(e => e.id === 'gc3');
    return ev ? ev.startMs + ev.durationMs : 39100;
  }

  function partyShouldHideOuterBossMarkers(elapsed){
    return elapsed >= partyGc3EndedMs();
  }

  function partyChaosSetElement(sc, setNum){
    return partyChaosLandingElement(setNum);
  }

  function partyChaosDamageShape(sc, setNum){
    const element = partyChaosLandingElement(setNum);
    const base = element === 'fire' ? 'circle' : 'donut';
    const chaosTruth = debuffChaosTruthForElement(sc?.debuff, element);
    return chaosTruth ? base : (base === 'circle' ? 'donut' : 'circle');
  }

  function partyChaosPositionOk(pt, sc, setNum){
    if(!pt || typeof pt.x !== 'number' || typeof pt.y !== 'number') return false;
    if(!p4AoePointInCircle(pt)) return false;
    const shape = partyChaosDamageShape(sc, setNum);
    const dist = Math.hypot(pt.x - 50, pt.y - 50);
    const targetR = PARTY_KEFKA_RING_R;
    if(shape === 'circle') return dist > targetR;
    return dist <= targetR;
  }

  function partyChaosDamageMarkup(shape, element){
    const uid = `partyChaos_${Math.floor(Math.random() * 1e6)}`;
    const r = PARTY_KEFKA_RING_R;
    const clip = `<clipPath id="${uid}_clip"><circle cx="50" cy="50" r="50"></circle></clipPath>`;
    const fill = element === 'fire' ? 'rgba(255,70,45,.46)' : 'rgba(70,150,255,.40)';
    const stroke = element === 'fire' ? 'rgba(255,120,80,.92)' : 'rgba(120,190,255,.92)';
    if(shape === 'circle'){
      return `<svg class="party-chaos-damage-svg" viewBox="0 0 100 100" aria-hidden="true"><defs>${clip}</defs><g clip-path="url(#${uid}_clip)"><circle cx="50" cy="50" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width=".85"></circle></g></svg>`;
    }
    const holeTop = (50 - r).toFixed(4);
    const donut = `<path fill="${fill}" fill-rule="evenodd" d="M50,0A50,50,0,1,1,49.999,0Z M50,${holeTop}A${r},${r},0,1,0,50.001,${holeTop}Z"></path>`;
    return `<svg class="party-chaos-damage-svg" viewBox="0 0 100 100" aria-hidden="true"><defs>${clip}</defs><g clip-path="url(#${uid}_clip)">${donut}</g></svg>`;
  }

  function partyActiveChaosLandFlash(run){
    const flash = run?.chaosLandFlash;
    if(!flash || Date.now() > flash.until) return null;
    return flash;
  }

  function appendPartyChaosLandDamage(mapArena, sc, flash){
    if(!mapArena || !flash || !sc) return;
    const shape = partyChaosDamageShape(sc, flash.set);
    const element = partyChaosSetElement(sc, flash.set);
    const layer = document.createElement('div');
    layer.className = 'party-chaos-land-layer';
    layer.insertAdjacentHTML('beforeend', partyChaosDamageMarkup(shape, element));
    const label = document.createElement('div');
    label.className = 'party-chaos-land-label';
    label.textContent = element === 'fire' ? 'ほのお' : 'つなみ';
    layer.appendChild(label);
    mapArena.appendChild(layer);
  }

  function partyShouldHideExdeath(elapsed){
    return partyShouldHideOuterBossMarkers(elapsed);
  }

  function tickPartyMovement(dtMs){
    const run = state.partyRun;
    if(!run?.active || run.paused || run.phase !== 'running') return;
    const k = run.keys;
    let dx = 0;
    let dy = 0;
    if(k.w) dy -= 1;
    if(k.s) dy += 1;
    if(k.a) dx -= 1;
    if(k.d) dx += 1;
    if(dx === 0 && dy === 0) return;
    const len = Math.hypot(dx, dy) || 1;
    dx /= len;
    dy /= len;
    const step = PARTY_MOVE_SPEED * (dtMs / 1000);
    partyMovePlayerByDelta(run, dx * step, dy * step);
  }

  function partyTickPlayerFacing(run){
    partyRecordPlayerPosition(run);
    partyUpdateFacingFromHistory(run);
  }

  function tickPartyRun(dtMs){
    const run = state.partyRun;
    if(!run?.active || run.paused || run.phase !== 'running') return;
    syncPartyPause();
    tickPartyMovement(dtMs);
    const elapsed = partyElapsedMs();
    const macroPosted = tickPartyMacros(elapsed);
    tickPartyTargetMarkers(elapsed);
    PARTY_DISPLAY_EVENTS.forEach(ev => {
      if(run.displayFired[ev.id] || elapsed < ev.atMs) return;
      run.displayFired[ev.id] = true;
      run.revealStage = ev.stage;
    });
    PARTY_CHECK_EVENTS.forEach(ev => {
      if(run.checked[ev.id] || elapsed < ev.atMs) return;
      if(ev.id === 'wl1_pos'){
        run.wlWindows.wl1 = { startMs: elapsed, endMs: elapsed + PARTY_WL_HITBOX_MS };
      } else if(ev.id === 'wl2_pos'){
        run.wlWindows.wl2 = { startMs: elapsed, endMs: elapsed + PARTY_WL_HITBOX_MS };
      } else if(ev.id === 'gaze1'){
        run.gazeWindows.gaze1 = { startMs: elapsed, endMs: elapsed + PARTY_WL_HITBOX_MS };
      } else if(ev.id === 'gaze2'){
        run.gazeWindows.gaze2 = { startMs: elapsed, endMs: elapsed + PARTY_WL_HITBOX_MS };
      }
      run.checked[ev.id] = true;
      if(ev.id === 'chaos1_land' || ev.id === 'chaos2_land'){
        run.chaosLandFlash = {
          set: ev.id === 'chaos1_land' ? 1 : 2,
          until: Date.now() + PARTY_CHAOS_LAND_FLASH_MS
        };
      }
      if(!run.scoreInvalid){
        const isAccelCheck = ev.id === 'wl1_accel' || ev.id === 'wl2_accel';
        if(isAccelCheck && !partyAccelCheckRequired(run.checks, ev.id)) return;
        const ok = partyCheckPlayerAt(ev.id, run.player, run.checks);
        if(!ok){
          run.failures += 1;
          run.flashUntil = Date.now() + 350;
          run.failLog.push({ id: ev.id, label: ev.label, ok: false });
        } else {
          run.failLog.push({ id: ev.id, label: ev.label, ok: true });
        }
      }
    });
    if(elapsed >= PARTY_END_MS){
      finishPartyRun();
      return;
    }
    partyTickPlayerFacing(run);
    render({ lightweight: true, macroPosted });
  }

  function partyRunAnimationFrame(timestamp){
    const run = state.partyRun;
    if(run.phase !== 'running' || !run.active){
      run.tickTimer = null;
      run.lastFrameAt = 0;
      return;
    }
    if(!run.paused){
      let dtMs = 1000 / 60;
      if(run.lastFrameAt){
        dtMs = Math.min(timestamp - run.lastFrameAt, PARTY_RUN_MAX_FRAME_MS);
      }
      run.lastFrameAt = timestamp;
      tickPartyRun(dtMs);
    }
    run.tickTimer = requestAnimationFrame(partyRunAnimationFrame);
  }

  function startPartyRunLoop(){
    state.partyRun.lastFrameAt = 0;
    state.partyRun.tickTimer = requestAnimationFrame(partyRunAnimationFrame);
  }

  function schedulePartyChaosFlashRender(){
    const run = state.partyRun;
    if(!partyActiveChaosLandFlash(run)) return;
    const wait = Math.max(0, run.chaosLandFlash.until - Date.now());
    setTimeout(() => render(), wait + 16);
  }

  function finishPartyRun(){
    const run = state.partyRun;
    run.active = false;
    run.phase = 'summary';
    clearPartyTimers();
    detachPartyKeyHandlers();
    run.keys = { w: false, a: false, s: false, d: false };
    render();
    schedulePartyChaosFlashRender();
  }

  function startPartyRun(){
    clearAutoTimer();
    clearPartyTimers();
    const sc = state.scenario;
    if(!sc) return;
    const role = sc.role || $('#roleSelect').value || 'MT';
    sc.role = role;
    state.partyRun.scenario = sc;
    if(!state.partyRun.checks){
      state.partyRun.checks = buildPartyChecks(sc, role);
    }
    state.partyRun.active = true;
    state.partyRun.paused = false;
    state.partyRun.phase = 'countdown';
    state.partyRun.countdown = 3;
    state.partyRun.anchorAt = 0;
    state.partyRun.pauseAccumMs = 0;
    state.partyRun.pauseStartedAt = 0;
    state.partyRun.player = { x: 50, y: 50, facing: 0 };
    state.partyRun.drag = null;
    state.partyRun.playerPosHistory = [];
    state.partyRun.lastMoveKey = 'w';
    state.partyRun.failures = 0;
    state.partyRun.checked = {};
    state.partyRun.revealStage = 'none';
    state.partyRun.displayFired = {};
    state.partyRun.failLog = [];
    state.partyRun.flashUntil = 0;
    state.partyRun.wlWindows = {};
    state.partyRun.gazeWindows = {};
    state.partyRun.chaosLandFlash = null;
    state.partyRun.scoreInvalid = false;
    state.partyRun.macrosPosted = {};
    state.partyRun.targetMarker = null;
    state.partyRun.markersGranted = {};
    state.partyRun.partyMapVisualCacheKey = null;
    state.partyRun.partyChatCacheKey = null;
    partyResetPlayerPosHistory(state.partyRun);
    render();
    state.partyRun.countdownTimer = setInterval(() => {
      if(state.partyRun.phase !== 'countdown') return clearPartyTimers();
      if(state.partyRun.paused) return;
      state.partyRun.countdown -= 1;
      if(state.partyRun.countdown <= 0){
        clearPartyTimers();
        state.partyRun.phase = 'running';
        state.partyRun.anchorAt = Date.now();
        attachPartyKeyHandlers();
        startPartyRunLoop();
        render();
      } else {
        render();
      }
    }, 1000);
  }

  function togglePartyPause(){
    const run = state.partyRun;
    if(run.phase === 'idle'){
      updatePartyTimerUi();
      return;
    }
    run.paused = !run.paused;
    syncPartyPause();
    render();
    updatePartyTimerUi();
  }

  function retryPartyRun(){
    const savedScenario = state.partyRun.scenario || state.scenario;
    const savedChecks = state.partyRun.checks;
    resetPartyRun();
    if(!savedScenario) return;
    state.scenario = savedScenario;
    state.partyRun.scenario = savedScenario;
    state.partyRun.checks = savedChecks || buildPartyChecks(savedScenario, savedScenario.role);
    startPartyRun();
  }

  function partyKeyDown(e){
    if(state.partyRun?.phase !== 'running' || state.partyRun?.paused) return;
    const k = e.key.toLowerCase();
    if(!['w', 'a', 's', 'd'].includes(k)) return;
    e.preventDefault();
    state.partyRun.keys[k] = true;
  }

  function partyKeyUp(e){
    const k = e.key.toLowerCase();
    if(['w', 'a', 's', 'd'].includes(k)) state.partyRun.keys[k] = false;
  }

  function partyDragAllowed(){
    const run = state.partyRun;
    return run?.phase === 'running' && !run?.paused;
  }

  function partyPointerDown(e){
    if(!partyDragAllowed()) return;
    const mapWrap = $('#mapWrap');
    if(!mapWrap) return;
    const run = state.partyRun;
    run.drag = {
      pointerId: e.pointerId,
      lastClientX: e.clientX,
      lastClientY: e.clientY
    };
    mapWrap.setPointerCapture(e.pointerId);
    mapWrap.classList.add('party-dragging');
    e.preventDefault();
  }

  function partyPointerMove(e){
    const run = state.partyRun;
    if(!run?.drag || run.drag.pointerId !== e.pointerId) return;
    if(!partyDragAllowed()){
      partyPointerUp(e);
      return;
    }
    const mapArena = $('#mapArena');
    if(!mapArena) return;
    const rect = mapArena.getBoundingClientRect();
    if(!rect.width || !rect.height) return;
    const dxClient = e.clientX - run.drag.lastClientX;
    const dyClient = e.clientY - run.drag.lastClientY;
    run.drag.lastClientX = e.clientX;
    run.drag.lastClientY = e.clientY;
    const dxPct = (dxClient / rect.width) * 100;
    const dyPct = (dyClient / rect.height) * 100;
    partyMovePlayerByDelta(run, dxPct, dyPct);
    /* 座標だけ更新。履歴・向きは次の rAF で tickPartyRun が処理する。 */
    updatePartyPlayerDotPosition(run.player);
    e.preventDefault();
  }

  function partyPointerUp(e){
    const run = state.partyRun;
    if(!run?.drag || run.drag.pointerId !== e.pointerId) return;
    const mapWrap = $('#mapWrap');
    if(mapWrap){
      if(mapWrap.hasPointerCapture(e.pointerId)) mapWrap.releasePointerCapture(e.pointerId);
      mapWrap.classList.remove('party-dragging');
    }
    run.drag = null;
  }

  function attachPartyDragHandlers(){
    if(partyDragHandlersAttached) return;
    const mapWrap = $('#mapWrap');
    if(!mapWrap) return;
    partyDragHandlersAttached = true;
    mapWrap.addEventListener('pointerdown', partyPointerDown);
    mapWrap.addEventListener('pointermove', partyPointerMove);
    mapWrap.addEventListener('pointerup', partyPointerUp);
    mapWrap.addEventListener('pointercancel', partyPointerUp);
  }

  function detachPartyDragHandlers(){
    if(!partyDragHandlersAttached) return;
    const mapWrap = $('#mapWrap');
    const run = state.partyRun;
    if(mapWrap){
      if(run?.drag && mapWrap.hasPointerCapture?.(run.drag.pointerId)){
        mapWrap.releasePointerCapture(run.drag.pointerId);
      }
      mapWrap.removeEventListener('pointerdown', partyPointerDown);
      mapWrap.removeEventListener('pointermove', partyPointerMove);
      mapWrap.removeEventListener('pointerup', partyPointerUp);
      mapWrap.removeEventListener('pointercancel', partyPointerUp);
      mapWrap.classList.remove('party-dragging');
    }
    if(run) run.drag = null;
    partyDragHandlersAttached = false;
  }

  function attachPartyKeyHandlers(){
    if(partyKeyHandlersAttached) return;
    partyKeyHandlersAttached = true;
    window.addEventListener('keydown', partyKeyDown);
    window.addEventListener('keyup', partyKeyUp);
    attachPartyDragHandlers();
  }

  function detachPartyKeyHandlers(){
    if(!partyKeyHandlersAttached) return;
    partyKeyHandlersAttached = false;
    window.removeEventListener('keydown', partyKeyDown);
    window.removeEventListener('keyup', partyKeyUp);
    detachPartyDragHandlers();
  }

  function updatePartyTimerUi(){
    const mapTimer = $('#practiceMapTimer');
    const mapPauseBtn = $('#practiceMapPauseBtn');
    if(!mapTimer) return;
    const run = state.partyRun;
    mapTimer.classList.toggle('show', !!run && (run.phase === 'running' || run.phase === 'summary'));
    if(mapPauseBtn) mapPauseBtn.textContent = run?.paused ? '再開' : '一時停止';
  }

  function partySummaryHtml(){
    const run = state.partyRun;
    const items = (run.failLog || []).map(entry => `<div class="practice-log-item ${entry.ok ? 'ok' : 'ng'}">${entry.label}：${entry.ok ? 'OK' : 'NG'}</div>`).join('');
    const totalChecks = partyApplicableCheckCount(run.checks);
    return `
      <div class="practice-log-box">
        <div class="practice-log-title">P4 GC 結果</div>
        <p style="text-align:center;margin:0 0 10px;font-weight:900">失敗 ${run.failures} 回 / ${totalChecks} 判定</p>
        <div class="practice-log-grid">${items || '<div>判定なし</div>'}</div>
        <div class="practice-log-actions">
          <button type="button" class="action" id="partySummaryRetryBtn">もう一度</button>
          <button type="button" class="action secondary" id="partySummaryNextBtn">別の問題</button>
        </div>
      </div>`;
  }

  function appendPartyKefkaRing(mapArena){
    if(!mapArena || mapArena.querySelector('.party-kefka-ring')) return;
    const ring = document.createElement('div');
    ring.className = 'party-kefka-ring';
    ring.setAttribute('aria-hidden', 'true');
    mapArena.appendChild(ring);
  }

  function appendPartyWlHitboxes(mapArena, correctDir){
    const centers = partyWlHitboxCenters();
    const size = PARTY_WL_HITBOX_R * 2;
    ['n', 's', 'e', 'w'].forEach(dir => {
      const c = centers[dir];
      const el = document.createElement('div');
      el.className = `party-wl-hitbox ${dir === correctDir ? 'correct-slot' : 'wrong-slot'}`;
      el.style.left = `${c.x}%`;
      el.style.top = `${c.y}%`;
      el.style.width = `${size}%`;
      el.style.height = `${size}%`;
      mapArena.appendChild(el);
    });
  }

  function partyGazeDirectionLabel(correctDirection){
    return correctDirection === 'in' ? '見る' : '見ない';
  }

  function appendPartyGazePositionAnswer(mapArena, correctPosition, correctDirection){
    if(!mapArena || mapArena.querySelector('.party-gaze-pos-layer')) return;
    appendPartyKefkaRing(mapArena);
    mapArena.querySelectorAll('.late-gaze-center-zone').forEach(el => el.remove());
    const directionLabel = partyGazeDirectionLabel(correctDirection);
    const positionLabel = correctPosition === 'inside' ? '視線持ち：内円へ' : '非視線：タゲサより外';
    const layer = document.createElement('div');
    layer.className = 'party-gaze-pos-layer';
    layer.setAttribute('aria-label', `${positionLabel}／${directionLabel}`);
    const label = document.createElement('div');
    label.className = 'party-gaze-pos-label';
    label.innerHTML = `${positionLabel}<br>${directionLabel}`;
    layer.appendChild(label);
    layer.insertAdjacentHTML('beforeend', partyGazeOverlaySvg(correctPosition));
    mapArena.appendChild(layer);
  }

  function renderPartyIceOnly(mapArena, iceBoard){
    mapArena.classList.add('debuff-set2-board');
    renderDebuffIceBoard(mapArena, iceBoard);
  }

  function appendPartyArenaMarker(mapArena){
    const a = document.createElement('div');
    a.className = 'arena-a-marker';
    a.textContent = 'A';
    mapArena.appendChild(a);
  }

  function appendPartyMagicOutRingLabels(mapArena, board){
    if(!mapArena || !board) return;
    mapArena.querySelector('.party-magic-out-rings')?.remove();
    const wrap = document.createElement('div');
    wrap.className = 'party-magic-out-rings';
    wrap.innerHTML = `
      <div class="aoe-ring-group aoe-ring-top"><div class="aoe-ring red"><span class="aoe-ring-text magic-out-ring-label">雷アウト</span>${truthIconHtml(board.thunderOutTruth)}</div></div>
      <div class="aoe-ring-group aoe-ring-bottom"><div class="aoe-ring blue"><span class="aoe-ring-text magic-out-ring-label">氷アウト</span>${truthIconHtml(board.iceOutTruth)}</div></div>
    `;
    mapArena.appendChild(wrap);
  }

  function appendPartyReadBossMarkers(mapArena, sc, elapsed){
    const ctx = partyBossMarkerContext(sc, elapsed);
    const chaosRound = ctx.round <= 2 ? ctx.round : 2;
    [
      { cls: 'chaos', label: 'カオス', truth: ctx.chaosTruth, hideTruth: !partyCastActiveForRound('chaos', chaosRound, elapsed) },
      { cls: 'exdeath', label: 'エクス<br>デス', truth: ctx.exTruth, hideTruth: !partyCastActiveForRound('gc', Math.min(ctx.round, 3), elapsed) }
    ].forEach(info => {
      if(partyShouldHideOuterBossMarkers(elapsed)) return;
      const el = document.createElement('div');
      el.className = `through-boss-marker ${info.cls}`;
      let truthHtml = '';
      if(!info.hideTruth){
        truthHtml = `<span class="truthmark ${info.truth ? 'true-mark' : 'false-mark'}">${info.truth ? '' : '?'}</span>`;
      }
      el.innerHTML = `${truthHtml}${info.label}`;
      mapArena.appendChild(el);
    });
  }

  function appendPartyCastBars(mapArena, sc, elapsed){
    if(!mapArena) return;
    getActivePartyCasts(elapsed).forEach(ev => {
      const label = partyCastEventLabel(ev, sc);
      const progress = Math.round(partyCastEventProgress(ev, elapsed) * 100);
      const hud = document.createElement('div');
      hud.className = `boss-cast-hud ${ev.hud}`;
      hud.dataset.castId = ev.id;
      hud.setAttribute('aria-label', `${label} 詠唱中`);
      let iconHtml = '';
      if(ev.type === 'chaos'){
        const round = ev.round || 1;
        const elType = partyChaosCastElement(sc?.debuff || sc, round);
        const iconSrc = debuffIconSrc(elType);
        if(iconSrc) iconHtml = `<img class="boss-cast-icon" src="${iconSrc}" alt="">`;
      }
      hud.innerHTML = `<div class="boss-cast-name">${iconHtml}<span>${label}</span></div><div class="boss-cast-track"><div class="boss-cast-fill" style="width:${progress}%"></div></div>`;
      mapArena.appendChild(hud);
    });
  }

  function renderPartyFloodBoard(mapArena, q){
    mapArena.classList.add('flood');
    mapArena.style.setProperty('--flood-rotation', `${q.map.rotationDeg || 0}deg`);
    (q.map.lanes || []).forEach(lane => {
      const el = document.createElement('div');
      el.className = `beam-lane ${lane.color}`;
      el.style.left = `${lane.x}%`;
      el.style.top = `${lane.y}%`;
      el.style.transform = `translate(-50%,-50%) rotate(${q.map.rotationDeg || 0}deg)`;
      mapArena.appendChild(el);
    });
    (q.map.symbols || []).forEach(symbol => {
      const el = document.createElement('div');
      if(symbol.kind === 'truth' || symbol.kind === 'beamTruth'){
        el.className = 'flood-symbol truth party-flood-beam-truth';
        el.innerHTML = `<span class="party-flood-truth-caption">ビーム</span>${truthIconHtml(!!symbol.truth)}`;
        el.title = `ビーム真偽：${symbol.truth ? '真' : '偽'}`;
      } else {
        el.className = `flood-symbol ${symbol.color}`;
        el.textContent = symbol.label;
      }
      el.style.left = `${symbol.x}%`;
      el.style.top = `${symbol.y}%`;
      mapArena.appendChild(el);
    });
    (q.map.bossMarkers || []).forEach(mark => {
      const el = document.createElement('div');
      el.className = 'arena-boss-marker';
      el.style.left = `${mark.x}%`;
      el.style.top = `${mark.y}%`;
      el.innerHTML = mark.label;
      mapArena.appendChild(el);
    });
  }

  function renderPartyGazeEarlyBoard(mapArena, q){
    renderP4GazeAoeBoard(mapArena, q.aoeGazeBoard, {}, false, false);
    mapArena.onclick = null;
    mapArena.querySelectorAll('.aoe-facing-choice').forEach(el => el.remove());
  }

  function renderPartyGazeLateBoard(mapArena, q){
    renderLateGazeBoard(mapArena, q, {}, false, false);
    mapArena.onclick = null;
    mapArena.querySelectorAll('.aoe-facing-choice').forEach(el => el.remove());
  }

  function updatePartyPlayerDotPosition(player){
    const mapArena = $('#mapArena');
    if(!mapArena || !player) return;
    const dot = mapArena.querySelector('.party-player-dot');
    if(!dot) return;
    dot.style.left = `${player.x}%`;
    dot.style.top = `${player.y}%`;
    const facingPivot = dot.querySelector('.party-player-facing-pivot');
    if(facingPivot) partyApplyPlayerFacingStyle(facingPivot, player.facing);
  }

  function appendPartyPlayerDot(mapArena, player, flash){
    const dot = document.createElement('div');
    dot.className = 'party-player-dot' + (flash ? ' fail-flash' : '');
    dot.style.left = `${player.x}%`;
    dot.style.top = `${player.y}%`;
    const facingPivot = document.createElement('div');
    facingPivot.className = 'party-player-facing-pivot';
    partyApplyPlayerFacingStyle(facingPivot, player.facing);
    const facing = document.createElement('div');
    facing.className = 'party-player-facing';
    facingPivot.appendChild(facing);
    dot.appendChild(facingPivot);
    const markerSrc = state.partyRun?.targetMarker?.src;
    if(markerSrc){
      const marker = document.createElement('img');
      marker.className = 'party-target-marker';
      marker.src = markerSrc;
      marker.alt = '';
      dot.appendChild(marker);
    }
    mapArena.appendChild(dot);
  }

  function appendPartyCenterOverlay(mapArena){
    if(!mapArena) return;
    const run = state.partyRun;
    if(run.phase === 'idle'){
      const overlay = document.createElement('div');
      overlay.className = 'practice-map-overlay';
      overlay.innerHTML = `<button type="button" class="practice-map-start"><span class="practice-map-start-main">スタート</span><span class="practice-map-start-sub">3カウントをはじめる</span></button>`;
      overlay.addEventListener('click', (e) => { e.stopPropagation(); startPartyRun(); });
      mapArena.appendChild(overlay);
      return;
    }
    if(run.phase === 'countdown'){
      const overlay = document.createElement('div');
      overlay.className = 'practice-map-overlay';
      overlay.innerHTML = `<div class="practice-countdown-big">${run.countdown}</div><div class="practice-countdown-label">開始まで</div>`;
      mapArena.appendChild(overlay);
      return;
    }
    if(run.phase === 'summary'){
      if(partyActiveChaosLandFlash(run)) return;
      const overlay = document.createElement('div');
      overlay.className = 'practice-log-overlay';
      overlay.innerHTML = partySummaryHtml();
      overlay.addEventListener('click', (e) => {
        if(e.target.closest('#partySummaryRetryBtn')){ e.stopPropagation(); retryPartyRun(); }
        if(e.target.closest('#partySummaryNextBtn')){ e.stopPropagation(); newQuestion(); }
      });
      mapArena.appendChild(overlay);
      return;
    }
    if(run.phase === 'running' && run.paused){
      const overlay = document.createElement('div');
      overlay.className = 'practice-paused-overlay';
      overlay.textContent = '一時停止中';
      mapArena.appendChild(overlay);
    }
  }

  function partyMapVisualCacheKey(run, elapsed){
    const visual = partyMapVisual(elapsed, run);
    const wlWindow = partyActiveWlWindow(elapsed, run);
    const gazeWindow = partyActiveGazeWindow(elapsed, run);
    const chaosFlash = partyActiveChaosLandFlash(run);
    const castIds = getActivePartyCasts(elapsed).map(ev => ev.id).sort().join(',');
    return [
      run.phase,
      run.paused ? 1 : 0,
      visual.kind,
      visual.magicNum || '',
      visual.readKind || '',
      wlWindow?.id || '',
      wlWindow?.correctDir || '',
      gazeWindow?.id || '',
      chaosFlash ? chaosFlash.set : '',
      partyMagicOutCastActive(elapsed) ? 1 : 0,
      run.revealStage || '',
      run.flashUntil > Date.now() ? 1 : 0,
      castIds
    ].join('|');
  }

  function updatePartyCastBarProgress(elapsed){
    const mapArena = $('#mapArena');
    const sc = state.partyRun?.scenario || state.scenario;
    if(!mapArena || !sc) return false;
    const active = getActivePartyCasts(elapsed);
    const activeIds = new Set(active.map(ev => ev.id));
    let ok = true;
    active.forEach(ev => {
      const hud = mapArena.querySelector(`.boss-cast-hud[data-cast-id="${ev.id}"]`);
      if(!hud){ ok = false; return; }
      const fill = hud.querySelector('.boss-cast-fill');
      if(fill) fill.style.width = `${Math.round(partyCastEventProgress(ev, elapsed) * 100)}%`;
    });
    mapArena.querySelectorAll('.boss-cast-hud[data-cast-id]').forEach(hud => {
      if(!activeIds.has(hud.dataset.castId)) hud.remove();
    });
    return ok;
  }

  function renderPartyQuestion(options = {}){
    const lightweight = !!options.lightweight;
    const mainPane = document.querySelector('.card .main');
    mainPane?.classList.add('party-layout');
    const mapWrap = $('#mapWrap');
    const mapArena = $('#mapArena');
    if(!mapWrap || !mapArena) return;
    mapWrap.classList.add('show');
    const sc = state.scenario;
    const run = state.partyRun;
    if(!sc || !run) return;
    const elapsed = run.phase === 'running' || run.phase === 'summary' ? partyElapsedMs() : 0;
    if(lightweight){
      const cacheKey = partyMapVisualCacheKey(run, elapsed);
      if(run.partyMapVisualCacheKey === cacheKey){
        if(run.phase === 'running') updatePartyPlayerDotPosition(run.player);
        if(updatePartyCastBarProgress(elapsed)) return;
      }
      run.partyMapVisualCacheKey = cacheKey;
    } else {
      run.partyMapVisualCacheKey = partyMapVisualCacheKey(run, elapsed);
    }
    mapArena.innerHTML = '';
    mapArena.className = 'arena party-no-labels';
    mapArena.onclick = null;
    clearThroughReadBossMarkers();
    const checks = run.checks || {};
    const visual = partyMapVisual(elapsed, run);
    syncPartyScenarioContext(sc, visual);
    const prevQ = sc.question;
    if(visual.kind === 'read'){
      const q = checks[`magic${visual.magicNum}_end`]?.question;
      if(q?.aoeBoard){
        sc.question = q;
        renderP4AoeBoard(mapArena, q.aoeBoard, null, false, false);
        mapArena.onclick = null;
      }
    } else if(visual.kind === 'flood'){
      const q = partyResolveFloodQuestion(sc, sc.role) || checks.flood_end?.question;
      if(q?.map) renderPartyFloodBoard(mapArena, q);
    } else if(visual.kind === 'wl2prep'){
      const q = checks.wl2_pos?.question;
      if(q?.debuffSet2Board?.iceBoard) renderPartyIceOnly(mapArena, q.debuffSet2Board.iceBoard);
    } else if(visual.kind === 'thunder1'){
      const q = checks.thunder1_charge?.question;
      if(q?.aoeBoard){
        sc.question = q;
        renderP4AoeBoard(mapArena, q.aoeBoard, null, false, false);
        mapArena.onclick = null;
      }
    } else if(visual.kind === 'gaze1'){
      if(!partyActiveGazeWindow(elapsed, run)){
        const q = checks.gaze1?.question;
        if(q) renderPartyGazeEarlyBoard(mapArena, q);
      }
    } else if(visual.kind === 'gaze2'){
      if(!partyActiveGazeWindow(elapsed, run)){
        const q = checks.gaze2?.question;
        if(q) renderPartyGazeLateBoard(mapArena, q);
      }
    } else if(visual.kind === 'magicOut'){
      const q = checks.magic_out_land?.question;
      if(q?.aoeBoard){
        sc.question = q;
        renderP4AoeBoard(mapArena, q.aoeBoard, null, false, false);
        mapArena.onclick = null;
      }
    }
    mapArena.classList.add('party-no-labels');
    const gazeWindow = partyActiveGazeWindow(elapsed, run);
    mapArena.classList.toggle('party-magic-out-cast-active', partyMagicOutCastActive(elapsed));
    if(['running', 'summary'].includes(run.phase)){
      appendPartyReadBossMarkers(mapArena, sc, elapsed);
    }
    const magicOutBoard = checks.magic_out_land?.question?.aoeBoard;
    if(partyMagicOutCastActive(elapsed) && magicOutBoard && visual.kind !== 'magicOut'){
      appendPartyMagicOutRingLabels(mapArena, magicOutBoard);
    } else {
      mapArena.querySelector('.party-magic-out-rings')?.remove();
    }
    sc.question = prevQ;
    const chaosFlash = partyActiveChaosLandFlash(run);
    if(chaosFlash) appendPartyChaosLandDamage(mapArena, sc, chaosFlash);
    const wlWindow = partyActiveWlWindow(elapsed, run);
    appendPartyKefkaRing(mapArena);
    if(wlWindow){
      if(wlWindow.id === 'wl2'){
        const q = checks.wl2_pos?.question;
        if(q?.debuffSet2Board?.iceBoard && !mapArena.querySelector('.debuff-ice-layer')) {
          renderPartyIceOnly(mapArena, q.debuffSet2Board.iceBoard);
        }
      }
      appendPartyWlHitboxes(mapArena, wlWindow.correctDir);
    }
    if(gazeWindow){
      const q = checks[gazeWindow.id]?.question;
      if(q){
        if(gazeWindow.id === 'gaze1'){
          appendPartyGazePositionAnswer(mapArena, partyGazeCorrectPosition(q), q.correctDirection);
        } else {
          if(!mapArena.querySelector('.late-gaze-board')){
            renderPartyGazeLateBoard(mapArena, q);
          }
          appendPartyGazePositionAnswer(mapArena, partyGazeCorrectPosition(q), q.correctDirection);
        }
      }
    }
    if(!mapArena.querySelector('.arena-a-marker')) appendPartyArenaMarker(mapArena);
    appendPartyCastBars(mapArena, sc, elapsed);
    if(run.phase === 'running'){
      appendPartyPlayerDot(mapArena, run.player, run.flashUntil > Date.now());
    }
    appendPartyCenterOverlay(mapArena);
  }


  function roleKind(role){ return thRoles.includes(role) ? 'th' : 'dps'; }

  function makeEmptyParty(){
    const p = {};
    roles.forEach(r => p[r] = []);
    return p;
  }

  function addDebuff(party, role, debuff){
    party[role].push(debuff);
  }

  function timerLabel(d){
    return d.time ? d.time : (d.timing ? timingLabel(d.timing) : '');
  }

  function chaosTimingByElement(e){
    return e === 'fire' ? 'early' : 'late';
  }

  function timeForDebuff(type, timing, sourceRound, displayRound){
    if(displayRound === 1){
      if(type === 'water' || type === 'lightning' || type === 'accel') return timing === 'early' ? '50' : '1m';
      if(type === 'gaze') return '59';
      if(type === 'fire' || type === 'waterChaos') return timing === 'early' ? '59' : '1m';
    }
    if(displayRound === 2){
      if(type === 'water' || type === 'lightning'){
        return timing === 'early' ? '35' : (sourceRound === 1 ? '59' : '59');
      }
      if(type === 'accel') return timing === 'early' ? '35' : '1m';
      if(type === 'gaze') return sourceRound === 1 ? '44' : '1m';
      if(type === 'fire' || type === 'waterChaos') return timing === 'early' ? '45' : '1m';
    }
    return '';
  }

  function makeTimedDebuff(type, timing, sourceRound, displayRound){
    return {type, timing, sourceRound, time: timeForDebuff(type, timing, sourceRound, displayRound)};
  }

  function debuffLabel(d){
    const t = timerLabel(d);
    const prefix = t ? `${t}` : '';
    if(d.type === 'water') return `${prefix}水圧縮`;
    if(d.type === 'lightning') return `${prefix}フォークライトニング`;
    if(d.type === 'accel') return `${prefix}加速度爆弾`;
    if(d.type === 'gaze') return `${prefix}叫声`;
    if(d.type === 'fire') return `${prefix}炎`;
    if(d.type === 'waterChaos') return `${prefix}水`;
    if(d.type === 'allagan') return `アラガン`;
    if(d.type === 'trans') return `死の超越`;
    if(d.type === 'dead') return `死者の傷`;
    if(d.type === 'living') return `生者の傷`;
    return d.label || d.type;
  }

  function debuffNameOnly(d){
    if(d.type === 'water') return '水圧縮';
    if(d.type === 'lightning') return 'フォークライトニング';
    if(d.type === 'accel') return '加速度爆弾';
    if(d.type === 'gaze') return '叫声';
    if(d.type === 'fire') return '炎';
    if(d.type === 'waterChaos') return '水';
    return debuffLabel(d);
  }

  function debuffHoverLabel(d){
    if(!d) return '';
    if(d.type === 'water') return '水圧縮（集合）';
    if(d.type === 'lightning') return 'フォークライトニング（散会）';
    if(d.type === 'gaze') return '叫声（視線）';
    if(d.type === 'fire') return 'ほのお';
    if(d.type === 'waterChaos') return 'つなみ';
    return debuffNameOnly(d);
  }

  function debuffLabelWithTiming(d){
    if(d && d.timing){
      return `${debuffLabel(d)}（${timingLabel(d.timing)}処理）`;
    }
    return debuffLabel(d);
  }

  function debuffBadgeHtml(d){
    return `<span class="badge ${debuffClass(d)}">${debuffLabelWithTiming(d)}</span>`;
  }

  function debuffClass(d){
    if(d.type === 'water') return 'water';
    if(d.type === 'lightning') return 'lightning';
    if(d.type === 'accel') return 'accel';
    if(d.type === 'gaze') return 'gaze';
    if(d.type === 'fire') return 'fire';
    if(d.type === 'waterChaos') return 'waterChaos';
    if(d.type === 'allagan') return 'allagan';
    if(d.type === 'trans') return 'trans';
    if(d.type === 'dead') return 'dead';
    if(d.type === 'living') return 'living';
    return '';
  }

  function debuffIconSrc(type){
    return DEBUFF_ICON_DATA[type] || '';
  }


  function partyListDebuffOrder(d){
    // パーティーリストでは、ゲーム内のデバフ付与順に近い固定順で左から表示する。
    // 死者/生者の傷 → アラガン/死の超越 → 叫声/水圧縮/フォークライトニング → 加速度 → ほのお → つなみ
    const order = {
      dead: 10,
      living: 10,
      allagan: 20,
      trans: 20,
      gaze: 30,
      water: 40,
      lightning: 40,
      accel: 50,
      fire: 60,
      waterChaos: 70
    };
    return order[d.type] ?? 999;
  }

  function sortDebuffsForPartyList(ds){
    return ds
      .map((d, i) => ({d, i}))
      .sort((a, b) => {
        const byType = partyListDebuffOrder(a.d) - partyListDebuffOrder(b.d);
        if(byType !== 0) return byType;
        const byTime = String(a.d.time || '').localeCompare(String(b.d.time || ''), 'ja', {numeric:true});
        if(byTime !== 0) return byTime;
        return a.i - b.i;
      })
      .map(x => x.d);
  }

  function chosenRoleWithDebuff(party){
    return $('#roleSelect').value || 'MT';
  }

  function assignWaterLightningAndGazeAccel(party, waterLightningTiming, gazeAccelTiming, sourceRound, displayRound){
    // 同じGC回の水雷4名には、そのGC回由来の加速度爆弾を付けない。
    // 視線持ちは必ず加速度爆弾つき。残りの無職1名/組にも、加速度爆弾のみを付ける。
    const noJobAccelTiming = oppTiming(gazeAccelTiming);
    for(const group of [thRoles, dpsRoles]){
      const s = shuffle(group);
      addDebuff(party, s[0], makeTimedDebuff('water', waterLightningTiming, sourceRound, displayRound));
      addDebuff(party, s[1], makeTimedDebuff('lightning', waterLightningTiming, sourceRound, displayRound));
      const pool = [s[2], s[3]];
      const gazeRole = pick(pool);
      const noJobRole = pool.find(r => r !== gazeRole);
      addDebuff(party, gazeRole, makeTimedDebuff('gaze', gazeAccelTiming, sourceRound, displayRound));
      addDebuff(party, gazeRole, makeTimedDebuff('accel', gazeAccelTiming, sourceRound, displayRound));
      addDebuff(party, noJobRole, makeTimedDebuff('accel', noJobAccelTiming, sourceRound, displayRound));
    }
  }

  function assignWaterLightningAndGazeAccelAcrossRounds(party, firstTiming){
    const secondTiming = oppTiming(firstTiming);
    for(const group of [thRoles, dpsRoles]){
      const s = shuffle(group);
      // GC1水雷4名：GC1では加速度なし。GC2では視線/無職側になる。
      addDebuff(party, s[0], makeTimedDebuff('water', firstTiming, 1, 2));
      addDebuff(party, s[1], makeTimedDebuff('lightning', firstTiming, 1, 2));
      // GC2水雷4名：GC2では加速度なし。GC1では視線/無職側になる。
      addDebuff(party, s[2], makeTimedDebuff('water', secondTiming, 2, 2));
      addDebuff(party, s[3], makeTimedDebuff('lightning', secondTiming, 2, 2));

      // GC1：視線は必ず早視線＋早加速度。無職は遅加速度のみ。
      const firstPool = [s[2], s[3]];
      const firstGazeRole = pick(firstPool);
      const firstNoJobRole = firstPool.find(r => r !== firstGazeRole);
      addDebuff(party, firstGazeRole, makeTimedDebuff('gaze', 'early', 1, 2));
      addDebuff(party, firstGazeRole, makeTimedDebuff('accel', 'early', 1, 2));
      addDebuff(party, firstNoJobRole, makeTimedDebuff('accel', 'late', 1, 2));

      // GC2：視線は必ず遅視線＋遅加速度。無職は早加速度のみ。
      const secondPool = [s[0], s[1]];
      const secondGazeRole = pick(secondPool);
      const secondNoJobRole = secondPool.find(r => r !== secondGazeRole);
      addDebuff(party, secondGazeRole, makeTimedDebuff('gaze', 'late', 2, 2));
      addDebuff(party, secondGazeRole, makeTimedDebuff('accel', 'late', 2, 2));
      addDebuff(party, secondNoJobRole, makeTimedDebuff('accel', 'early', 2, 2));
    }
  }

  function assignChaosToAll(party, element, sourceRound, displayRound){
    const timing = chaosTimingByElement(element);
    roles.forEach(r => addDebuff(party, r, makeTimedDebuff(element, timing, sourceRound, displayRound)));
  }

  function roleHasUsefulDebuff(party, role, round){
    const ds = party[role] || [];
    if(round === 3) return ds.some(d => ['allagan','trans'].includes(d.type));
    return ds.some(d => d.sourceRound === round && ['water','lightning','accel','gaze','fire','waterChaos'].includes(d.type));
  }

  function allRolesHaveUsefulDebuff(party, round){
    return roles.every(role => roleHasUsefulDebuff(party, role, round));
  }

  function generateGC12(round){
    let scenario;
    const fixedRole = $('#roleSelect').value;
    for(let tries=0; tries<120; tries++){
      const exTruth = bool();
      const exTruth2 = round === 2 ? bool() : exTruth;
      const party = makeEmptyParty();
      const firstWaterLightningTiming = bool() ? 'early' : 'late';
      const waterLightningTiming = round === 1 ? firstWaterLightningTiming : oppTiming(firstWaterLightningTiming);
      const firstChaosElement = bool() ? 'fire' : 'waterChaos';
      const chaosElement = firstChaosElement === 'fire' ? 'waterChaos' : 'fire';
      const chaosTruth = bool();
      const chaosTruth2 = round === 2 ? bool() : chaosTruth;

      if(round === 1){
        assignWaterLightningAndGazeAccel(party, waterLightningTiming, 'early', 1, 1);
        assignChaosToAll(party, firstChaosElement, 1, 1);
      } else {
        assignWaterLightningAndGazeAccelAcrossRounds(party, firstWaterLightningTiming);
        assignChaosToAll(party, firstChaosElement, 1, 2);
        assignChaosToAll(party, chaosElement, 2, 2);
      }

      if(!allRolesHaveUsefulDebuff(party, round)) continue;
      const role = fixedRole;

      scenario = {round, party, role, exTruth, exTruth2, chaosTruth, chaosTruth2, chaosElement, firstChaosElement, firstWaterLightningTiming, waterLightningTiming};
      break;
    }
    return scenario || generateGC12Fallback(round);
  }

  function generateGC12Fallback(round){
    const exTruth = bool();
    const exTruth2 = round === 2 ? bool() : exTruth;
    const party = makeEmptyParty();
    const firstWaterLightningTiming = bool() ? 'early' : 'late';
    const waterLightningTiming = round === 1 ? firstWaterLightningTiming : oppTiming(firstWaterLightningTiming);
    const firstChaosElement = bool() ? 'fire' : 'waterChaos';
    const chaosElement = firstChaosElement === 'fire' ? 'waterChaos' : 'fire';
    const chaosTruth = bool();
    const chaosTruth2 = round === 2 ? bool() : chaosTruth;
    if(round === 1){
      assignWaterLightningAndGazeAccel(party, waterLightningTiming, 'early', 1, 1);
      assignChaosToAll(party, firstChaosElement, 1, 1);
    } else {
      assignWaterLightningAndGazeAccelAcrossRounds(party, firstWaterLightningTiming);
      assignChaosToAll(party, firstChaosElement, 1, 2);
      assignChaosToAll(party, chaosElement, 2, 2);
    }
    const role = $('#roleSelect').value || 'MT';
    roles.forEach(r => {
      if(!roleHasUsefulDebuff(party, r, round)){
        addDebuff(party, r, makeTimedDebuff('accel', round === 1 ? 'early' : 'late', round, round));
      }
    });
    return {round, party, role, exTruth, exTruth2, chaosTruth, chaosTruth2, chaosElement, firstChaosElement, firstWaterLightningTiming, waterLightningTiming};
  }

    const base = type === 'water' ? 'stack' : 'spread';

  function rotateMapPoint(x, y, step){

    const dx = x - 50;
    const dy = y - 50;
    return {
      x: 50 + dx * Math.cos(rad) - dy * Math.sin(rad),
      y: 50 + dx * Math.sin(rad) + dy * Math.cos(rad)
    };
  }

  function makeP4AoeConfig(phase){
    return {
      phase,
      ice: pick(P4_ICE_PATTERNS),
      light: pick(P4_LIGHT_PATTERNS),
      thunderChargeTruth: bool(),
      iceChargeTruth: bool(),
      thunderOutTruth: bool(),
      iceOutTruth: bool()
    };
  }

  function p4AoeVisibleLightningDanger(board, band){
    return board.light.startsDanger ? (band % 2 === 0) : (band % 2 === 1);
  }

  function p4AoePointInVisibleIce(pt, board){
    const isA = pt.x < 50 && pt.y < 50;
    const isB = pt.x >= 50 && pt.y < 50;
    const isC = pt.x >= 50 && pt.y >= 50;
    const isD = pt.x < 50 && pt.y >= 50;
    return board.ice.value === '13' ? (isA || isC) : (isB || isD);
  }

  function p4AoePointInLightningShownDanger(pt, board){
    const dx = pt.x - 50;
    const dy = pt.y - 50;
    const deg = board.light.slope === 'up' ? 45 : -45;
    const rad = deg * Math.PI / 180;
    const xr = 50 + dx * Math.cos(rad) - dy * Math.sin(rad);
    let band = Math.floor(xr / 25);
    if(band < 0) band = 0;
    if(band > 3) band = 3;
    return p4AoeVisibleLightningDanger(board, band);
  }

  function p4AoePointInCircle(pt){
    const dx = pt.x - 50;
    const dy = pt.y - 50;
    return dx * dx + dy * dy <= 50 * 50;
  }

  function p4AoeThunderSafeByTruth(pt, board, truth){
    const shownDanger = p4AoePointInLightningShownDanger(pt, board);
    const actualDanger = truth ? shownDanger : !shownDanger;
    return !actualDanger;
  }

  function p4AoeIceSafeByTruth(pt, board, truth){
    const shownDanger = p4AoePointInVisibleIce(pt, board);
    const actualDanger = truth ? shownDanger : !shownDanger;
    return !actualDanger;
  }

  function p4AoeThunderFinalSafe(pt, board){
    const rememberedSafe = p4AoeThunderSafeByTruth(pt, board, board.thunderChargeTruth);
    return board.thunderOutTruth ? rememberedSafe : !rememberedSafe;
  }

  function p4AoeIceFinalSafe(pt, board){
    const rememberedSafe = p4AoeIceSafeByTruth(pt, board, board.iceChargeTruth);
    return board.iceOutTruth ? rememberedSafe : !rememberedSafe;
  }

  function p4AoePointIsCorrect(pt, board){
    if(!p4AoePointInCircle(pt)) return false;
    if(board.phase === 'thunderCharge') return p4AoeThunderSafeByTruth(pt, board, board.thunderChargeTruth);
    if(board.phase === 'iceCharge') return p4AoeIceSafeByTruth(pt, board, board.iceChargeTruth);
    if(board.phase === 'readBoth') return p4AoeThunderSafeByTruth(pt, board, board.thunderChargeTruth) && p4AoeIceSafeByTruth(pt, board, board.iceChargeTruth);
    return p4AoeThunderFinalSafe(pt, board) && p4AoeIceFinalSafe(pt, board);
  }

  function p4AoeActualLightningSafeBands(board, mode){
    const safeBands = [];
    for(let idx=0; idx<4; idx++){
      let safe = !p4AoeVisibleLightningDanger(board, idx);
      if(mode === 'charge'){
        if(!board.thunderChargeTruth) safe = !safe;
      } else {
        const remembered = board.thunderChargeTruth ? safe : !safe;
        safe = board.thunderOutTruth ? remembered : !remembered;
      }
      if(safe) safeBands.push(idx);
    }
    return safeBands;
  }

  function p4AoeActualIceSafeZones(board, mode){
    const shownZones = board.ice.zones;
    const otherZones = board.ice.value === '13' ? ['B','D'] : ['A','C'];
    if(mode === 'charge'){
      return board.iceChargeTruth ? otherZones : shownZones;
    }
    const rememberedZones = board.iceChargeTruth ? otherZones : shownZones;
    const oppositeZones = rememberedZones.join('') === 'AC' ? ['B','D'] : ['A','C'];
    return board.iceOutTruth ? rememberedZones : oppositeZones;
  }

  function makeDebuffFlowSlideQuestion(sc, role, slideIndex){
    const i = ((slideIndex % DEBUFF_FLOW_TOTAL) + DEBUFF_FLOW_TOTAL) % DEBUFF_FLOW_TOTAL;
    const gcRound = i <= 3 ? 1 : 2;
    const savedExTruth = sc.exTruth;
    const savedChaosTruth = sc.chaosTruth;
    sc.exTruth = debuffExTruth(sc, gcRound);
    if(i === 3) sc.chaosTruth = debuffChaosTruthForElement(sc, CHAOS1_ELEMENT);
    else if(i === 7) sc.chaosTruth = debuffChaosTruthForElement(sc, CHAOS2_ELEMENT);
    let question;
    if(i === 0) question = makeDebuffFlowSet1Question(sc, role, i);
    else if(i === 1) question = makeDebuffFlowGazeQuestion(sc, role, 'early', i, '早視線処理', '雷床安置に入り、そこで視線を処理します。マジックチャージ1回目の暗記はこのタブでは要求しません。');
    else if(i === 2) question = makeDebuffFlowCenterQuestion(role, i, 'early');
    else if(i === 3) question = makeDebuffFlowChaosQuestion(sc, role, 'early', i, '早ほのおタケノコ捨て', '全員中央集合後、早ほのおを処理します。');
    else if(i === 4) question = makeDebuffFlowSet2Question(sc, role, i);
    else if(i === 5) question = makeDebuffFlowGazeQuestion(sc, role, 'late', i, '遅視線処理', '遅視線持ちはケフカ足元へ駆け込みます。');
    else if(i === 6) question = makeDebuffFlowCenterQuestion(role, i, 'late');
    else question = makeDebuffFlowChaosQuestion(sc, role, 'late', i, '遅つなみタケノコ捨て', '遅視線後、全員ケフカ下に集合して遅つなみを処理します。');
    sc.exTruth = savedExTruth;
    sc.chaosTruth = savedChaosTruth;
    return question;
  }

  function getDebuffFlowConfig(sc, key, factory){
    if(!sc.debuffFlowConfigs) sc.debuffFlowConfigs = {};
    if(!sc.debuffFlowConfigs[key]) sc.debuffFlowConfigs[key] = factory();
    return sc.debuffFlowConfigs[key];
  }

  function getDebuffFlowSlideQuestion(sc, role, slideIndex){
    const idx = ((slideIndex % DEBUFF_FLOW_TOTAL) + DEBUFF_FLOW_TOTAL) % DEBUFF_FLOW_TOTAL;
    if(!sc.debuffFlowQuestions) sc.debuffFlowQuestions = {};
    const key = `${idx}:${role}:wl2`;
    if(!sc.debuffFlowQuestions[key]){
      sc.debuffFlowQuestions[key] = makeDebuffFlowSlideQuestion(sc, role, idx);

  function clonePartyWithSourceRound(party, sourceRound, displayRound){
    const p = makeEmptyParty();
    roles.forEach(role => {
      (party[role] || []).forEach(d => {
        if(d.sourceRound !== sourceRound) return;
        const copy = {...d};
        if(copy.timing && ['water','lightning','accel','gaze','fire','waterChaos'].includes(copy.type)){
          copy.time = timeForDebuff(copy.type, copy.timing, copy.sourceRound, displayRound);
        }
        p[role].push(copy);
      });
    });
    return p;
  }

  function mergeParties(...parties){
    const p = makeEmptyParty();
    roles.forEach(role => {
      parties.forEach(party => {
        (party?.[role] || []).forEach(d => p[role].push({...d}));
      });
    });
    return p;
  }

  function syncThroughMagicBoard(sc, role){
    if(!sc.magicBoard) sc.magicBoard = makeP4AoeConfig('magicOut');
    const gazeQ = getDebuffFlowSlideQuestion(sc.debuff, role, 1);
    if(gazeQ?.aoeGazeBoard){
      sc.magicBoard.light = {...gazeQ.aoeGazeBoard.light};
      sc.magicBoard.thunderChargeTruth = !!gazeQ.aoeGazeBoard.thunderTruth;
    }
    const iceQ = getDebuffFlowSlideQuestion(sc.debuff, role, 4);
    if(iceQ?.debuffSet2Board?.iceBoard){
      const iceBoard = iceQ.debuffSet2Board.iceBoard;
      sc.magicBoard.ice = {...iceBoard.ice, zones:[...(iceBoard.ice?.zones || [])]};
      sc.magicBoard.iceChargeTruth = !!iceBoard.iceTruth;
    }
    return sc.magicBoard;
  }

  function makeThroughMagicOutKefkaCheck(sc, role){
    const base = CHAOS2_ELEMENT === 'fire' ? 'circle' : 'donut';
    const finalShape = debuffChaosTruthForElement(sc.debuff, CHAOS2_ELEMENT) ? base : (base === 'circle' ? 'donut' : 'circle');
    return {
      area: finalShape === 'circle' ? 'outside' : 'inside',
      finalShape,
      radius: 22,
      label: finalShape === 'circle' ? '点線円の外側' : '点線円の中'
    };
